<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Campaign Cockpit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; background: #0c0c0e; color: #f0f0f0; padding: 14px; max-width: 1400px; margin: 0 auto; }

    header { margin-bottom: 10px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .tagline { font-size: 12px; color: #666; }

    /* Tab bar */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; background: #161618; border: 1px solid #2a2a2e; border-radius: 12px; padding: 3px; }
    .tab { flex: 1; padding: 8px 0; background: transparent; border: none; color: #666; font-size: 14px; font-weight: 600; border-radius: 9px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .tab.active { background: #2a2a2e; color: #f0f0f0; }

    /* KPI row */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .kpi { background: #161618; border: 1px solid #2a2a2e; border-radius: 12px; padding: 10px 14px; }
    .kpi-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #666; font-weight: 600; }
    .kpi-val { font-size: 28px; font-weight: 700; margin-top: 2px; line-height: 1; }

    /* Two-column dashboard layout */
    .dash-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .dash-col  { display: flex; flex-direction: column; gap: 10px; }

    /* Cards */
    .card { background: #161618; border: 1px solid #2a2a2e; border-radius: 12px; padding: 12px 14px; }
    .card-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #666; margin-bottom: 10px; font-weight: 600; }

    /* Colors */
    .red    { color: #ff453a; }
    .green  { color: #32d74b; }
    .yellow { color: #ffd60a; }
    .blue   { color: #0a84ff; }

    /* Pipeline */
    .pipeline-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
    .pipeline-label { width: 110px; font-size: 12px; color: #aaa; text-transform: capitalize; flex-shrink: 0; }
    .bar-wrap { flex: 1; background: #222; border-radius: 4px; height: 14px; overflow: hidden; }
    .bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .pipeline-count { width: 28px; text-align: right; font-size: 12px; color: #888; }

    /* Platform grid */
    .plat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .plat-cell { background: #1e1e22; border-radius: 8px; padding: 8px 10px; }
    .plat-name { font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .plat-num  { font-size: 18px; font-weight: 700; }
    .plat-sub  { font-size: 10px; color: #555; margin-top: 1px; }

    /* Week grid */
    .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .week-cell { background: #1e1e22; border-radius: 7px; padding: 6px 4px; text-align: center; }
    .week-label { font-size: 9px; color: #666; margin-bottom: 2px; }
    .week-total { font-size: 16px; font-weight: 700; }
    .week-blocked { font-size: 9px; color: #ff453a; margin-top: 1px; }

    /* Tags */
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .emotion-tag { background: #1e1228; border: 1px solid #3a1a5a; color: #bf5af2; border-radius: 5px; padding: 3px 8px; font-size: 11px; }
    .funnel-tag  { background: #0e1a2e; border: 1px solid #1a3a5a; color: #0a84ff; border-radius: 5px; padding: 3px 8px; font-size: 11px; }
    .tag-count   { color: #888; font-size: 10px; margin-left: 3px; }

    /* Queue / Blocked / Late items */
    .queue-item  { background: #1a1c14; border-left: 3px solid #ffd60a; border-radius: 0 8px 8px 0; padding: 7px 10px; margin-bottom: 6px; }
    .blocked-item{ border-left: 3px solid #ff453a; padding: 7px 10px; margin-bottom: 6px; background: #1a1214; border-radius: 0 8px 8px 0; }
    .late-item   { background: #1a1414; border-left: 3px solid #ff6b35; border-radius: 0 8px 8px 0; padding: 7px 10px; margin-bottom: 6px; }
    .item-id     { font-size: 10px; color: #888; }
    .item-main   { font-size: 12px; font-weight: 500; margin-top: 2px; }
    .item-meta   { font-size: 10px; color: #555; margin-top: 1px; }

    /* Refresh button */
    .btn { background: #1e1e22; border: 1px solid #2a2a2e; color: #888; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer; font-family: inherit; }
    .btn:active { background: #2a2a2e; color: #f0f0f0; }

    /* Loading */
    .loading { text-align: center; padding: 60px 0; color: #555; font-size: 15px; }
    .dot-anim::after { content: '.'; animation: dots 1.2s infinite; }
    @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

    /* ── Calendar ────────────────────────────────────────── */
    .cal-outer { }
    .cal-month-label { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
    .cal-dow-cell { text-align: center; font-size: 10px; color: #555; font-weight: 600; padding: 2px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

    .cal-day { background: #0e0e10; border: 1px solid #1a1a1e; border-radius: 8px; padding: 5px 4px 5px; min-height: 58px; cursor: pointer; user-select: none; }
    .cal-day.in-campaign { background: #161618; border-color: #2a2a2e; }
    .cal-day.is-today { border-color: #0a84ff !important; }
    .cal-day.outside { opacity: 0.2; cursor: default; pointer-events: none; }
    .cal-day.has-blocked.in-campaign { background: #180e0e; }
    .cal-day.all-published.in-campaign { background: #0a180e; }

    .cal-date { font-size: 11px; font-weight: 600; color: #555; line-height: 1; margin-bottom: 4px; }
    .cal-day.in-campaign .cal-date { color: #ccc; }
    .cal-day.is-today .cal-date { color: #0a84ff; }

    .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 3px; }
    .cal-dot  { width: 6px; height: 6px; border-radius: 50%; }

    .cal-badge { font-size: 10px; font-weight: 600; color: #555; }
    .cal-day.in-campaign .cal-badge { color: #888; }
    .cal-day.has-blocked .cal-badge { color: #ff453a; }
    .cal-day.all-published .cal-badge { color: #32d74b; }

    /* ── Day detail bottom sheet ─────────────────────────── */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 20; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }

    .day-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1e; border-radius: 20px 20px 0 0; z-index: 21; max-height: 76vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
    .day-sheet.open { transform: translateY(0); }
    .sheet-handle-wrap { padding: 12px 16px 0; flex-shrink: 0; }
    .sheet-handle { width: 36px; height: 4px; background: #3a3a3e; border-radius: 2px; margin: 0 auto; }
    .sheet-header { padding: 12px 16px 10px; flex-shrink: 0; border-bottom: 1px solid #2a2a2e; display: flex; align-items: baseline; justify-content: space-between; }
    .sheet-title { font-size: 17px; font-weight: 700; }
    .sheet-subtitle { font-size: 11px; color: #666; }
    .sheet-close { background: #2a2a2e; border: none; color: #888; width: 26px; height: 26px; border-radius: 50%; font-size: 13px; cursor: pointer; font-family: inherit; }
    .sheet-body { overflow-y: auto; padding: 10px 16px 28px; flex: 1; }

    .post-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #1e1e22; }
    .post-row:last-child { border-bottom: none; }
    .plat-chip { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; letter-spacing: 0.5px; flex-shrink: 0; min-width: 40px; text-align: center; }
    .post-info { flex: 1; min-width: 0; }
    .post-status-line { font-size: 12px; color: #888; }
    .post-emotion { font-size: 11px; color: #666; margin-top: 1px; }
    .post-id { font-size: 10px; color: #444; white-space: nowrap; }
    .post-blocked { font-size: 11px; color: #ff453a; margin-top: 2px; }

    .plat-ig  { background: #2a0a18; color: #e1306c; }
    .plat-tt  { background: #1a1a1a; color: #aaa; }
    .plat-pin { background: #2a0005; color: #e60023; }
    .plat-fb  { background: #0a1528; color: #4a9eff; }
    .plat-em  { background: #0a1528; color: #0a84ff; }
    .plat-def { background: #1e1e22; color: #888; }

    .status-dot-lg { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; flex-shrink: 0; }

    /* Collapse to single column on phone */
    @media (max-width: 680px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .dash-cols { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Campaign Cockpit</h1>
    <div class="tagline" id="tagline">EC-2026-001 · Loading<span class="dot-anim"></span></div>
  </header>

  <div class="tab-bar">
    <button class="tab active" id="tab-dash" onclick="switchTab('dash')">Dashboard</button>
    <button class="tab"        id="tab-cal"  onclick="switchTab('cal')">Calendar</button>
  </div>

  <div id="panel-dash"><div class="loading">Loading dashboard<span class="dot-anim"></span></div></div>
  <div id="panel-cal" style="display:none"><div class="loading">Loading calendar<span class="dot-anim"></span></div></div>

  <!-- Day detail sheet -->
  <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
  <div class="day-sheet" id="day-sheet">
    <div class="sheet-handle-wrap"><div class="sheet-handle"></div></div>
    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="sheet-title">—</div>
        <div class="sheet-subtitle" id="sheet-subtitle"></div>
      </div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>

  <script>
    var CAM_START = new Date(2026, 4, 27);
    var CAM_END   = new Date(2026, 5, 30);

    var PIPELINE_COLORS = {
      generated:'#3a3a3a', in_figma:'#0a4a8a', designer_review:'#6a5a00',
      approved:'#0a5a1a', scheduled:'#0a3a6a', published:'#0a6a3a', reported:'#3a3a6a'
    };
    var STATUS_DOT_COLOR = {
      generated:'#3a3a3a', in_figma:'#3a7aff', designer_review:'#ffd60a',
      approved:'#30c05a', scheduled:'#0a84ff', published:'#32d74b', reported:'#bf5af2'
    };
    var STATUS_LABEL = {
      generated:'Generated', in_figma:'In Figma', designer_review:'Designer Review',
      approved:'Approved', scheduled:'Scheduled', published:'Published', reported:'Reported'
    };
    var DOW    = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var dashData = null;
    var calData  = null;
    var activeTab = 'dash';

    // ── Tabs ──────────────────────────────────────────────────────────────────
    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-dash').className = 'tab' + (tab === 'dash' ? ' active' : '');
      document.getElementById('tab-cal').className  = 'tab' + (tab === 'cal'  ? ' active' : '');
      document.getElementById('panel-dash').style.display = tab === 'dash' ? '' : 'none';
      document.getElementById('panel-cal').style.display  = tab === 'cal'  ? '' : 'none';
      if (tab === 'cal' && calData) renderCal(calData);
    }

    // ── Dashboard ─────────────────────────────────────────────────────────────
    function fmt(n) { return (n || 0).toString(); }

    function pipelineBar(label, n, total, color) {
      var pct = total ? Math.max(2, Math.round(n / total * 100)) : 0;
      if (!n) pct = 0;
      return '<div class="pipeline-row">' +
        '<div class="pipeline-label">' + label.replace(/_/g,' ') + '</div>' +
        '<div class="bar-wrap"><div class="bar" style="width:' + pct + '%;background:' + color + '"></div></div>' +
        '<div class="pipeline-count">' + fmt(n) + '</div></div>';
    }

    function renderDash(d) {
      var total   = d.total_assets || 0;
      var blocked = d.blocked_count || 0;
      var aq      = d.approval_queue_count || 0;
      var rts     = d.ready_to_schedule_count || 0;
      var late    = d.late_count || 0;
      var now     = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

      document.getElementById('tagline').innerHTML =
        'EC-2026-001 &nbsp;·&nbsp; ' + total + ' assets &nbsp;·&nbsp; ' + now;

      // KPIs — full width row
      var kpis =
        '<div class="kpi"><div class="kpi-label">Total Assets</div><div class="kpi-val">' + total + '</div></div>' +
        '<div class="kpi"><div class="kpi-label">Blocked</div><div class="kpi-val red">' + blocked + '</div></div>' +
        '<div class="kpi"><div class="kpi-label">Approval Queue</div><div class="kpi-val yellow">' + aq + '</div></div>' +
        '<div class="kpi"><div class="kpi-label">Ready to Post</div><div class="kpi-val green">' + rts + '</div></div>';

      // ── Left column ────────────────────────────────────────────────────────
      var pipe = d.pipeline || {};
      var pipeBars = Object.keys(pipe).map(function(s) {
        return pipelineBar(s, pipe[s], total, PIPELINE_COLORS[s] || '#444');
      }).join('');

      var bw = d.by_week || {};
      var weekCells = Object.keys(bw).sort().map(function(w) {
        var wk = bw[w];
        return '<div class="week-cell">' +
          '<div class="week-label">' + w.replace('week_','Wk') + '</div>' +
          '<div class="week-total">' + wk.total + '</div>' +
          '<div class="week-blocked">' + wk.blocked + ' blk</div></div>';
      }).join('');

      var be = d.by_emotional_stage || {};
      var emotions = Object.keys(be).map(function(e) {
        return '<span class="emotion-tag">' + e + '<span class="tag-count"> ' + be[e] + '</span></span>';
      }).join('');

      var bf = d.by_funnel_stage || {};
      var funnels = Object.keys(bf).map(function(f) {
        return '<span class="funnel-tag">' + f + '<span class="tag-count"> ' + bf[f] + '</span></span>';
      }).join('');

      var leftCol =
        '<div class="card"><div class="card-title">Pipeline Status</div>' + pipeBars + '</div>' +
        '<div class="card"><div class="card-title">By Week</div><div class="week-grid">' + weekCells + '</div></div>' +
        '<div class="card"><div class="card-title">Emotional Arc</div><div class="tag-wrap">' + emotions + '</div></div>' +
        '<div class="card"><div class="card-title">Funnel Stages</div><div class="tag-wrap">' + funnels + '</div></div>';

      // ── Right column ───────────────────────────────────────────────────────
      var bp = d.by_platform || {};
      var platCells = Object.keys(bp).map(function(p) {
        var pl  = bp[p];
        var gen = pl.generated || 0;
        var pub = pl.published || 0;
        return '<div class="plat-cell"><div class="plat-name">' + p + '</div>' +
          '<div class="plat-num">' + gen + '</div>' +
          '<div class="plat-sub">' + pub + ' published</div></div>';
      }).join('');

      var aqItems = (d.approval_queue || []).slice(0,8).map(function(item) {
        return '<div class="queue-item"><div class="item-id">' + item.asset_id + ' · ' + item.platform + '</div>' +
          '<div class="item-main yellow">Publish: ' + (item.publish_date || '—') + '</div></div>';
      }).join('') || '<div style="color:#555;font-size:12px;padding:4px 0">No items awaiting approval.</div>';

      var blItems = blocked > 0
        ? '<div class="blocked-item"><div class="item-id">All ' + blocked + ' assets</div>' +
          '<div class="item-main red">Waiting for Figma — not yet assigned</div>' +
          '<div class="item-meta">Set creative_status = in_figma to unblock</div></div>'
        : '<div style="color:#32d74b;font-size:12px;padding:4px 0">No blocked assets.</div>';

      var lateCard = late > 0
        ? '<div class="card"><div class="card-title red">Late (' + late + ')</div>' +
          (d.late_assets || []).slice(0,3).map(function(a) {
            return '<div class="late-item"><div class="item-id">' + a.asset_id + ' · ' + a.platform + '</div>' +
              '<div class="item-main red">Due: ' + a.publish_date + '</div></div>';
          }).join('') + '</div>'
        : '';

      var rightCol =
        '<div class="card"><div class="card-title">By Platform</div><div class="plat-grid">' + platCells + '</div></div>' +
        '<div class="card"><div class="card-title yellow">Approval Queue</div>' + aqItems + '</div>' +
        '<div class="card"><div class="card-title red">Blocked (' + blocked + ')</div>' + blItems + '</div>' +
        lateCard;

      document.getElementById('panel-dash').innerHTML =
        '<div class="kpi-grid">' + kpis + '</div>' +
        '<div class="dash-cols">' +
          '<div class="dash-col">' + leftCol + '</div>' +
          '<div class="dash-col">' + rightCol + '</div>' +
        '</div>' +
        '<button class="btn" onclick="load()">&#8635; Refresh</button>';
    }

    // ── Calendar ──────────────────────────────────────────────────────────────
    function isoDate(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
    }

    function platformClass(p) {
      var m = {instagram:'plat-ig',tiktok:'plat-tt',pinterest:'plat-pin',facebook:'plat-fb',email:'plat-em'};
      return m[p.toLowerCase()] || 'plat-def';
    }
    function platformLabel(p) {
      var m = {instagram:'IG',tiktok:'TT',pinterest:'PIN',facebook:'FB',email:'EMAIL'};
      return m[p.toLowerCase()] || p.toUpperCase().slice(0,4);
    }

    function renderCal(data) {
      if (!data || !data.days) {
        document.getElementById('panel-cal').innerHTML = '<div class="loading">No calendar data.</div>';
        return;
      }
      var days  = data.days;
      var today = isoDate(new Date());
      var gridStart = new Date(2026, 4, 24);
      var gridEnd   = new Date(2026, 6, 4);

      var dowHtml = DOW.map(function(d) {
        return '<div class="cal-dow-cell">' + d + '</div>';
      }).join('');

      var cells = '';
      var cur = new Date(gridStart);
      while (cur <= gridEnd) {
        var dk     = isoDate(cur);
        var dayNum = cur.getDate();
        var inCamp = cur >= CAM_START && cur <= CAM_END;
        var isToday= dk === today;
        var dayObj = days[dk] || null;

        var cls = 'cal-day' + (!inCamp ? ' outside' : ' in-campaign') + (isToday ? ' is-today' : '');
        if (dayObj && dayObj.blocked === dayObj.total && dayObj.total > 0) cls += ' has-blocked';
        if (dayObj && dayObj.published === dayObj.total && dayObj.total > 0) cls += ' all-published';

        var dateLbl = dayNum === 1 ? MONTHS[cur.getMonth()].toUpperCase() + ' 1' : String(dayNum);

        var dotsHtml = '', badgeHtml = '';
        if (dayObj && dayObj.total > 0) {
          var ps = {};
          dayObj.posts.forEach(function(p) {
            var c = p.blocked ? '#ff453a' : (STATUS_DOT_COLOR[p.status] || '#3a3a3a');
            if (!ps[p.platform] || p.blocked) ps[p.platform] = c;
          });
          dotsHtml  = '<div class="cal-dots">' + Object.keys(ps).slice(0,5).map(function(pl) {
            return '<div class="cal-dot" style="background:' + ps[pl] + '"></div>';
          }).join('') + '</div>';
          badgeHtml = '<div class="cal-badge">' + dayObj.total + '</div>';
        }

        var onclick = inCamp && dayObj ? ' onclick="openSheet(\'' + dk + '\')"' : '';
        cells += '<div class="' + cls + '"' + onclick + '>' +
          '<div class="cal-date">' + dateLbl + '</div>' + dotsHtml + badgeHtml + '</div>';
        cur.setDate(cur.getDate() + 1);
      }

      document.getElementById('panel-cal').innerHTML =
        '<div class="cal-outer">' +
        '<div class="cal-month-label">May 27 – Jun 30, 2026</div>' +
        '<div class="cal-dow">' + dowHtml + '</div>' +
        '<div class="cal-grid">' + cells + '</div>' +
        '</div>';
    }

    // ── Day detail sheet ──────────────────────────────────────────────────────
    function openSheet(dk) {
      if (!calData || !calData.days || !calData.days[dk]) return;
      var day   = calData.days[dk];
      var parts = dk.split('-');
      var d     = new Date(+parts[0], +parts[1]-1, +parts[2]);

      document.getElementById('sheet-title').textContent = MONTHS[d.getMonth()] + ' ' + d.getDate() + ', 2026';
      document.getElementById('sheet-subtitle').textContent =
        'Day ' + day.day + ' · Week ' + day.week + ' · ' + day.total + ' posts';

      document.getElementById('sheet-body').innerHTML = day.posts.map(function(p) {
        var dotColor   = p.blocked ? '#ff453a' : (STATUS_DOT_COLOR[p.status] || '#3a3a3a');
        var statusTxt  = (STATUS_LABEL[p.status] || p.status) + (p.approval_status === 'approved' ? ' · Approved' : '');
        var blockedLn  = p.blocked && p.blocked_reason ? '<div class="post-blocked">⚠ ' + p.blocked_reason + '</div>' : '';
        var emotionLn  = p.emotional_stage ? '<div class="post-emotion">' + p.emotional_stage + (p.funnel_stage ? ' · ' + p.funnel_stage : '') + '</div>' : '';
        return '<div class="post-row">' +
          '<span class="plat-chip ' + platformClass(p.platform) + '">' + platformLabel(p.platform) + '</span>' +
          '<div class="post-info">' +
            '<div class="post-status-line"><span class="status-dot-lg" style="background:' + dotColor + '"></span>' + statusTxt + '</div>' +
            emotionLn + blockedLn +
          '</div>' +
          '<div class="post-id">' + p.asset_id + '</div></div>';
      }).join('') || '<div style="color:#555">No posts.</div>';

      document.getElementById('sheet-overlay').className = 'sheet-overlay open';
      document.getElementById('day-sheet').className = 'day-sheet open';
    }

    function closeSheet() {
      document.getElementById('sheet-overlay').className = 'sheet-overlay';
      document.getElementById('day-sheet').className = 'day-sheet';
    }

    // ── Data loading ──────────────────────────────────────────────────────────
    function loadDashboard() {
      google.script.run
        .withSuccessHandler(function(r) {
          if (r && r.ok) { dashData = r; renderDash(r); }
          else document.getElementById('panel-dash').innerHTML =
            '<div class="loading">Error loading data.</div>' +
            '<button class="btn" onclick="load()" style="margin-top:12px">&#8635; Retry</button>';
        })
        .withFailureHandler(function() {
          document.getElementById('panel-dash').innerHTML =
            '<div class="loading">Connection error.</div>' +
            '<button class="btn" onclick="load()" style="margin-top:12px">&#8635; Retry</button>';
        })
        .getCampaignDashboard('EC-2026-001');
    }

    function loadCalendar() {
      google.script.run
        .withSuccessHandler(function(r) {
          if (r && r.ok) {
            calData = r;
            if (activeTab === 'cal') renderCal(r);
          }
        })
        .withFailureHandler(function() {})
        .getCampaignCalendar('EC-2026-001');
    }

    function load() {
      document.getElementById('tagline').innerHTML =
        'EC-2026-001 &nbsp;·&nbsp; Refreshing<span class="dot-anim"></span>';
      loadDashboard();
      loadCalendar();
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>

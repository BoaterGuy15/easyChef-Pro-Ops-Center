<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Campaign Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Proza+Libre:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F6EFE8;
      --surface:   #FFFFFF;
      --surface-2: #FFFFFF;
      --surface-3: #FAF7F4;
      --input:     #F6EFE8;
      --border:    rgba(0,0,0,0.08);
      --border-sub:rgba(0,0,0,0.06);
      --text-hi:   #111111;
      --text-md:   #555555;
      --text-lo:   #888888;
      --text-dim:  #AAAAAA;
      --accent:    #FF0000;
      --accent-10: rgba(255,0,0,0.10);
      --accent-18: rgba(255,0,0,0.18);
      --accent-25: rgba(255,0,0,0.25);
      --green:     #16a34a;
      --yellow:    #b45309;
      --red-soft:  #dc2626;
      --purple:    #7c3aed;
      --font-head: 'Proza Libre', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font-body); background: #F6EFE8; color: #111; padding: 14px; max-width: 1500px; margin: 0 auto; }

    header { margin-bottom: 12px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; font-family: var(--font-head); color: #111; }
    .tagline { font-size: 12px; color: #888; }

    /* Layout */
    .cockpit-layout { display: flex; gap: 12px; align-items: flex-start; }

    /* Floating filter panels */
    .filter-panel { position: fixed; background: #FFFFFF; border: 1px solid rgba(0,0,0,0.10); border-radius: 10px; padding: 8px 10px 10px; z-index: 150; min-width: 136px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); touch-action: none; transition: box-shadow 0.12s; }
    .filter-panel.fp-hidden { visibility: hidden; }
    .filter-panel.fp-snapping { border-color: rgba(255,0,0,0.40); box-shadow: 0 0 0 2px var(--accent-18), 0 2px 12px rgba(0,0,0,0.10); }
    .fp-handle { font-size: 9px; text-transform: uppercase; letter-spacing: 0.9px; color: #aaa; font-weight: 600; margin-bottom: 6px; cursor: grab; display: flex; align-items: center; gap: 5px; user-select: none; -webkit-user-select: none; }
    .fp-handle:active { cursor: grabbing; }
    .fp-grip { font-size: 14px; color: #ddd; line-height: 1; }
    .fg-pills { display: flex; flex-direction: column; gap: 3px; }
    .fp { background: #FFFFFF; border: 1px solid #FF0000; color: #000; padding: 5px 10px; border-radius: 7px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; text-align: left; transition: all 0.12s; width: 100%; }
    .fp.on { border-color: var(--accent); color: #FFFFFF; background: var(--accent); font-weight: 600; }
    .fp.on-em { border-color: #7c3aed; color: #7c3aed; background: rgba(124,58,237,0.10); font-weight: 600; }
    .active-count { font-size: 9px; color: var(--accent); font-weight: 700; margin-left: auto; display: none; }
    .clear-btn { width: 100%; background: transparent; border: 1px solid #dc2626; color: #dc2626; padding: 6px 10px; border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }

    /* Main */
    .main { flex: 1; min-width: 0; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; background: #F6EFE8; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 3px; }
    .tab { flex: 1; padding: 8px 0; background: transparent; border: none; color: #888; font-size: 14px; font-weight: 600; border-radius: 9px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .tab.active { background: #FFFFFF; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.10); }

    /* KPIs */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .kpi { background: #FFFFFF; border: none; border-top: 3px solid #FF0000; border-radius: 12px; padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .kpi-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #888; font-weight: 600; }
    .kpi-val { font-size: 26px; font-weight: 700; margin-top: 2px; line-height: 1; font-family: var(--font-head); color: #111; }

    /* Two-column */
    .dash-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .dash-col  { display: flex; flex-direction: column; gap: 10px; }

    /* Cards */
    .card { background: #FFFFFF; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 12px 14px; }
    .card-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #888; margin-bottom: 10px; font-weight: 600; }

    .red    { color: #dc2626; }
    .green  { color: #16a34a; }
    .yellow { color: #b45309; }
    .blue   { color: var(--accent); }

    /* Pipeline — clickable rows */
    .pipeline-row { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; cursor: pointer; border-radius: 6px; padding: 2px 4px; transition: background 0.12s; }
    .pipeline-row:hover { background: #FAF7F4; }
    .pipeline-row.on { background: var(--accent-10); }
    .pipeline-label { width: 100px; font-size: 11px; color: #666; text-transform: capitalize; flex-shrink: 0; }
    .pipeline-row.on .pipeline-label { color: var(--accent); font-weight: 600; }
    .bar-wrap { flex: 1; background: #F6EFE8; border-radius: 4px; height: 13px; overflow: hidden; }
    .bar { height: 100%; border-radius: 4px; background: #FF0000; transition: width 0.4s ease; }
    .pipeline-count { width: 26px; text-align: right; font-size: 11px; color: #888; }

    /* Platform cells — clickable */
    .plat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .plat-cell { background: #F6EFE8; border-radius: 8px; padding: 7px 10px; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
    .plat-cell:hover { border-color: rgba(0,0,0,0.12); }
    .plat-cell.on { border-color: var(--accent); background: var(--accent-10); }
    .plat-name { font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .plat-num  { font-size: 17px; font-weight: 700; color: #111; }
    .plat-sub  { font-size: 10px; color: #aaa; margin-top: 1px; }

    /* Week cells — clickable */
    .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .week-cell { background: #F6EFE8; border-radius: 7px; padding: 5px 4px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
    .week-cell:hover { border-color: rgba(0,0,0,0.12); }
    .week-cell.on { border-color: var(--accent); background: var(--accent-10); }
    .week-label { font-size: 9px; color: #888; margin-bottom: 2px; }
    .week-total { font-size: 15px; font-weight: 700; color: #111; }
    .week-blocked { font-size: 9px; color: #dc2626; margin-top: 1px; }

    /* Emotion tags — clickable */
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .emotion-tag { background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.22); color: #7c3aed; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; transition: all 0.12s; user-select: none; }
    .emotion-tag:hover { border-color: #7c3aed; }
    .emotion-tag.on { background: rgba(124,58,237,0.14); border-color: #7c3aed; font-weight: 600; }

    /* Funnel tags — clickable */
    .funnel-tag { background: rgba(255,0,0,0.06); border: 1px solid rgba(255,0,0,0.22); color: var(--accent); border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; transition: all 0.12s; user-select: none; }
    .funnel-tag:hover { border-color: var(--accent); }
    .funnel-tag.on { background: var(--accent-25); border-color: var(--accent); font-weight: 600; color: #FFF; }
    .tag-count { color: #aaa; font-size: 10px; margin-left: 3px; }

    /* List items */
    .queue-item  { background: rgba(180,83,9,0.06); border-left: 3px solid #b45309; border-radius: 0 7px 7px 0; padding: 6px 10px; margin-bottom: 5px; }
    .blocked-item{ border-left: 3px solid #dc2626; padding: 6px 10px; margin-bottom: 5px; background: rgba(220,38,38,0.06); border-radius: 0 7px 7px 0; }
    .late-item   { background: rgba(220,100,38,0.06); border-left: 3px solid #c2410c; border-radius: 0 7px 7px 0; padding: 6px 10px; margin-bottom: 5px; }
    .item-id   { font-size: 10px; color: #888; }
    .item-main { font-size: 12px; font-weight: 500; margin-top: 2px; color: #111; }
    .item-meta { font-size: 10px; color: #888; margin-top: 1px; }

    /* Matching Posts panel */
    .posts-panel { background: #FFFFFF; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 12px 14px; margin-top: 10px; }
    .posts-panel-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .posts-panel-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent); font-weight: 600; }
    .posts-panel-count { font-size: 11px; color: #888; }
    .posts-list { max-height: 220px; overflow-y: auto; }
    .post-row-sm { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .post-row-sm:last-child { border-bottom: none; }
    .post-sm-id { font-size: 11px; color: #555; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-sm-em  { font-size: 10px; color: #7c3aed; white-space: nowrap; }
    .post-sm-fn  { font-size: 10px; color: var(--accent); white-space: nowrap; }
    .post-sm-dt  { font-size: 10px; color: #888; white-space: nowrap; }

    /* Refresh */
    .btn { background: #FFFFFF; border: 1px solid rgba(0,0,0,0.12); color: #555; padding: 9px; border-radius: 10px; font-size: 13px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer; font-family: inherit; }
    .btn:active { background: #F6EFE8; }

    /* Loading */
    .loading { text-align: center; padding: 60px 0; color: #888; font-size: 14px; }
    .dot-anim::after { content: '.'; animation: dots 1.2s infinite; }
    @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

    /* Calendar — Google-style grid */
    /* ── Resize handles (shared by day-popup + pm-card) ──────────────────── */
    .rs-handle { position:absolute; z-index:5; }
    .rs-n  { top:-4px;    left:14px;   right:14px;  height:8px;  cursor:n-resize; }
    .rs-s  { bottom:-4px; left:14px;   right:14px;  height:8px;  cursor:s-resize; }
    .rs-e  { right:-4px;  top:14px;    bottom:14px; width:8px;   cursor:e-resize; }
    .rs-w  { left:-4px;   top:14px;    bottom:14px; width:8px;   cursor:w-resize; }
    .rs-ne { top:-5px;    right:-5px;  width:14px;  height:14px; cursor:ne-resize; }
    .rs-nw { top:-5px;    left:-5px;   width:14px;  height:14px; cursor:nw-resize; }
    .rs-se { bottom:-5px; right:-5px;  width:14px;  height:14px; cursor:se-resize; }
    .rs-sw { bottom:-5px; left:-5px;   width:14px;  height:14px; cursor:sw-resize; }

    /* ── Calendar 2.0 ──────────────────────────────────────────────────────── */
    .cal-scroll { display:flex; flex-direction:column; gap:28px; }
    .cal-month-title { font-size:15px; font-weight:700; letter-spacing:-0.2px; padding:8px 0 4px; color:#111; font-family: var(--font-head); }
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid rgba(0,0,0,0.08); }
    .cal-nav-left { display:flex; align-items:center; gap:8px; }
    .cal-nav-title { font-size:13px; font-weight:500; color:#888; letter-spacing:0; }
    .cal-nav-btn { background:#FFFFFF; border:1px solid rgba(0,0,0,0.10); color:#555; width:30px; height:30px; border-radius:8px; font-size:16px; cursor:pointer; font-family:inherit; transition:all 0.12s; display:flex; align-items:center; justify-content:center; }
    .cal-nav-btn:hover { background:#F6EFE8; color:#000; }
    .cal-today-btn { background:transparent; border:1px solid rgba(0,0,0,0.12); color:#888; padding:4px 10px; border-radius:6px; font-size:10px; font-weight:600; cursor:pointer; font-family:inherit; letter-spacing:0.3px; transition:all 0.12s; }
    .cal-today-btn:hover { border-color:var(--accent); color:var(--accent); }
    .add-ms-btn { background:rgba(220,38,38,0.08); border:1px solid rgba(220,38,38,0.30); color:#dc2626; padding:5px 12px; border-radius:8px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.12s; }
    .add-ms-btn:hover { background:rgba(220,38,38,0.15); }
    .cal-dow { display:grid; grid-template-columns:repeat(7,1fr); border-top:1px solid rgba(0,0,0,0.08); border-left:1px solid rgba(0,0,0,0.08); margin-bottom:0; }
    .cal-dow-cell { border-right:1px solid rgba(0,0,0,0.08); border-bottom:1px solid rgba(0,0,0,0.08); text-align:center; font-size:9px; color:#aaa; font-weight:600; padding:5px 4px; letter-spacing:0.3px; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); border-left:1px solid rgba(0,0,0,0.08); }
    .cal-day { background:#EDE8E0; border-right:1px solid rgba(0,0,0,0.06); border-bottom:1px solid rgba(0,0,0,0.06); min-height:90px; padding:5px 5px 4px; display:flex; flex-direction:column; cursor:default; user-select:none; box-sizing:border-box; }
    .cal-day.in-campaign { background:#FFFFFF; border-right-color:rgba(0,0,0,0.08); border-bottom-color:rgba(0,0,0,0.08); cursor:pointer; }
    .cal-day.in-campaign:hover { background:#FAF7F4; }
    .cal-day.is-today { background:#FFF5F5 !important; }
    .cal-day.outside { background:#E8E3DB; pointer-events:none; }
    .cal-day.has-blocked { background:#FFF0F0 !important; }
    .cal-day.all-published { background:#F0FBF4 !important; }
    .cal-day.filtered-empty { opacity:0.40; }
    .cal-date { font-size:10px; font-weight:600; color:#ccc; line-height:1; margin-bottom:4px; flex-shrink:0; display:flex; align-items:center; }
    .cal-day.in-campaign .cal-date { color:#888; }
    .cal-day.outside .cal-date { color:#bbb; }
    .cal-date-num { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-size:11px; }
    .cal-day.is-today .cal-date-num { background:var(--accent); color:#fff !important; font-weight:700; }
    .cal-date.date-red .cal-date-num { color:#FF0000 !important; font-weight:800 !important; }
    .cal-events { display:flex; flex-direction:column; gap:2px; flex:1; overflow:hidden; }
    .cal-event-bar { display:block; font-size:9px; font-weight:600; padding:1px 5px 1px 6px; border-radius:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:15px; border-left:3px solid transparent; }
    .cal-ms-banner { display:block; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:15px; }
        /* Milestone modal */
    .ms-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:50; display:none; align-items:center; justify-content:center; padding:20px; }
    .ms-overlay.open { display:flex; }
    .ms-card { background:#FFFFFF; border:1px solid rgba(0,0,0,0.10); border-radius:16px; width:100%; max-width:380px; box-shadow:0 12px 40px rgba(0,0,0,0.15); }
    .ms-head { padding:14px 18px 10px; border-bottom:1px solid rgba(0,0,0,0.08); display:flex; align-items:center; justify-content:space-between; }
    .ms-htitle { font-size:15px; font-weight:700; color:#111; }
    .ms-xbtn { background:#F6EFE8; border:none; color:#888; width:28px; height:28px; border-radius:50%; font-size:13px; cursor:pointer; font-family:inherit; }
    .ms-body { padding:16px 18px 20px; display:flex; flex-direction:column; gap:12px; }
    .ms-lbl { font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:#888; margin-bottom:4px; font-weight:600; display:block; }
    .ms-inp { width:100%; background:#F6EFE8; border:1px solid rgba(0,0,0,0.10); border-radius:8px; color:#111; font-family:inherit; font-size:13px; padding:9px 12px; outline:none; box-sizing:border-box; transition:border-color 0.12s; }
    .ms-inp:focus { border-color:var(--accent); }
    .ms-swatches { display:flex; gap:8px; }
    .ms-swatch { width:30px; height:30px; border-radius:7px; cursor:pointer; border:2px solid transparent; transition:all 0.12s; flex-shrink:0; }
    .ms-swatch.on { border-color:#111; box-shadow:0 0 0 3px rgba(0,0,0,0.12); }
    .ms-savebtn { background:#FF0000; border:none; color:#fff; padding:11px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; width:100%; }
    .ms-savebtn:disabled { background:#eee; color:#bbb; cursor:default; }
    .ms-msg { font-size:11px; min-height:16px; color:#16a34a; text-align:center; }

    /* Day popup — draggable + resizable floating card, no scrollbar */
    .day-popup { position:fixed; background:#FFFFFF; border:1px solid rgba(0,0,0,0.10); border-radius:16px; z-index:200; width:500px; box-shadow:0 12px 40px rgba(0,0,0,0.15); display:none; flex-direction:column; overflow:hidden; }
    .day-popup.open { display:flex; }
    .sheet-header { padding:13px 16px 11px; border-bottom:1px solid rgba(0,0,0,0.08); background:#F6EFE8; display:flex; align-items:center; justify-content:space-between; cursor:grab; flex-shrink:0; user-select:none; -webkit-user-select:none; }
    .sheet-header:active { cursor:grabbing; }
    .sheet-title { font-size:17px; font-weight:700; color:#111; font-family:var(--font-head); }
    .sheet-subtitle { font-size:11px; color:#888; margin-top:2px; }
    .sheet-close { background:rgba(0,0,0,0.08); border:none; color:#555; width:26px; height:26px; border-radius:50%; font-size:13px; cursor:pointer; font-family:inherit; flex-shrink:0; }
    .sheet-body { padding:10px 16px 16px; flex:1; overflow:hidden; background:#FFFFFF; }
    .post-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .post-row:last-child { border-bottom: none; }
    .plat-chip { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; letter-spacing: 0.5px; flex-shrink: 0; min-width: 38px; text-align: center; }
    .post-info { flex: 1; min-width: 0; }
    .post-status-line { font-size: 12px; color: #555; }
    .post-emotion { font-size: 11px; color: #888; margin-top: 1px; }
    .post-id { font-size: 10px; color: #aaa; white-space: nowrap; }
    .post-figma-link { font-size: 10px; color: #7c3aed; text-decoration: none; white-space: nowrap; padding: 2px 6px; border: 1px solid rgba(124,58,237,0.30); border-radius: 4px; flex-shrink: 0; }
    .post-figma-link:hover { background: rgba(124,58,237,0.08); }
    .post-blocked { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
    .reason-pill { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; white-space: nowrap; }
    .reason-pill.amber { background: rgba(180,83,9,0.10); color: #b45309; border: 1px solid rgba(180,83,9,0.25); }
    .reason-pill.gray  { background: rgba(100,100,100,0.08); color: #666; border: 1px solid rgba(100,100,100,0.20); }
    .reason-pill.red   { background: rgba(220,38,38,0.08); color: #dc2626; border: 1px solid rgba(220,38,38,0.20); }
    .plat-ig  { background: rgba(225,48,108,0.12); color: #c2185b; }
    .plat-tt  { background: rgba(0,0,0,0.06); color: #555; }
    .plat-pin { background: rgba(230,0,35,0.10); color: #c0001e; }
    .plat-fb  { background: rgba(66,103,178,0.12); color: #1a56b0; }
    .plat-em  { background: var(--accent-10); color: var(--accent); }
    .plat-def { background: rgba(0,0,0,0.06); color: #888; }
    .plat-x   { background: rgba(0,0,0,0.06); color: #222; }
    .plat-prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .plat-prog-name { font-size: 10px; color: #888; width: 70px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .plat-prog-bar { flex: 1; background: #F6EFE8; border-radius: 4px; height: 8px; overflow: hidden; }
    .plat-prog-fill { height: 100%; background: #16a34a; border-radius: 4px; transition: width 0.4s ease; }
    .plat-prog-stat { font-size: 10px; color: #888; white-space: nowrap; }
    .blocked-progress-hdr { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; font-weight: 600; margin: 10px 0 6px; }
    .status-dot-lg { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; flex-shrink: 0; }

    /* Post detail modal — draggable + resizable floating card, no scrollbar */

    /* Notes */
    .pm-notes-feed { margin-bottom: 10px; }

    .pm-note-input { width: 100%; background: #F6EFE8; border: 1px solid rgba(0,0,0,0.10); border-radius: 8px; color: #333; font-family: inherit; font-size: 12px; padding: 9px 11px; resize: none; outline: none; transition: border-color 0.12s; box-sizing: border-box; }

    @media (max-width: 720px) {
      .cockpit-layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
      .fg-pills { flex-direction: row; flex-wrap: wrap; }

      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .dash-cols { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Campaign Cockpit</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <select id="campaign-select" onchange="switchCampaign(this.value)" style="background:#FFFFFF;border:1px solid rgba(0,0,0,0.12);color:#333;padding:5px 10px;border-radius:7px;font-size:11px;font-family:inherit;cursor:pointer">
        <option value="all">All Campaigns</option>
      </select>
      <div class="tagline" id="tagline">Loading<span class="dot-anim"></span></div>
    </div>
  </header>

  <div class="cockpit-layout">

    <!-- Floating filter panels — draggable, magnet-snap -->
    <div class="filter-panel fp-hidden" id="fpanel-platform">
      <div class="fp-handle" onmousedown="fpDown(event,'platform')" ontouchstart="fpTouch(event,'platform')">
        <span class="fp-grip">⠿</span>Platform
        <span class="active-count" id="active-count"></span>
      </div>
      <div class="fg-pills" id="fp-platform"></div>
      <button class="clear-btn" id="clear-btn" onclick="clearFilters()" style="display:none">✕ Clear All</button>
    </div>
    <div class="filter-panel fp-hidden" id="fpanel-status">
      <div class="fp-handle" onmousedown="fpDown(event,'status')" ontouchstart="fpTouch(event,'status')"><span class="fp-grip">⠿</span>Status</div>
      <div class="fg-pills" id="fp-status"></div>
    </div>
    <div class="filter-panel fp-hidden" id="fpanel-emotion">
      <div class="fp-handle" onmousedown="fpDown(event,'emotion')" ontouchstart="fpTouch(event,'emotion')"><span class="fp-grip">⠿</span>Emotion</div>
      <div class="fg-pills" id="fp-emotion"></div>
    </div>
    <div class="filter-panel fp-hidden" id="fpanel-funnel">
      <div class="fp-handle" onmousedown="fpDown(event,'funnel')" ontouchstart="fpTouch(event,'funnel')"><span class="fp-grip">⠿</span>Funnel Stage</div>
      <div class="fg-pills" id="fp-funnel"></div>
    </div>
    <div class="filter-panel fp-hidden" id="fpanel-week">
      <div class="fp-handle" onmousedown="fpDown(event,'week')" ontouchstart="fpTouch(event,'week')"><span class="fp-grip">⠿</span>Week</div>
      <div class="fg-pills" id="fp-week"></div>
    </div>
    <div class="filter-panel fp-hidden" id="fpanel-seq">
      <div class="fp-handle" onmousedown="fpDown(event,'seq')" ontouchstart="fpTouch(event,'seq')"><span class="fp-grip">⠿</span>Sequence</div>
      <div class="fg-pills" id="fp-seq"></div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="tab-bar">
        <button class="tab active" id="tab-dash" onclick="switchTab('dash')">Dashboard</button>
        <button class="tab"        id="tab-cal"  onclick="switchTab('cal')">Calendar</button>
      </div>
      <div id="panel-dash"><div class="loading">Loading<span class="dot-anim"></span></div></div>
      <div id="panel-cal" style="display:none"><div class="loading">Loading calendar<span class="dot-anim"></span></div></div>
    </div>
  </div>

  <!-- Post detail modal -->
  <div class="pm-card" id="pm-card">
    <div class="pm-head" id="pm-head">
      <span id="pm-plat-chip" class="plat-chip plat-def"></span>
      <div class="pm-title">
        <div class="pm-asset-id" id="pm-asset-id">—</div>
        <div class="pm-asset-sub" id="pm-asset-sub"></div>
      </div>
      <button class="pm-close" onclick="closePostModal()">✕</button>
    </div>
    <div class="pm-body" id="pm-body"></div>
  </div>


  <!-- Add Milestone modal -->
  <div class="ms-overlay" id="ms-overlay" onclick="if(event.target===this)closeMsModal()">
    <div class="ms-card">
      <div class="ms-head">
        <span class="ms-htitle">Add Milestone</span>
        <button class="ms-xbtn" onclick="closeMsModal()">&#x2715;</button>
      </div>
      <div class="ms-body">
        <div><label class="ms-lbl">Title</label><input class="ms-inp" id="ms-title" placeholder="e.g. Content deadline, Review, Launch…" /></div>
        <div><label class="ms-lbl">Date</label><input class="ms-inp" id="ms-date" type="date" /></div>
        <div>
          <label class="ms-lbl">Color</label>
          <div class="ms-swatches">
            <div class="ms-swatch on" style="background:#FF0000" data-color="#FF0000" onclick="selectMsColor(this)"></div>
            <div class="ms-swatch" style="background:#ff9500" data-color="#ff9500" onclick="selectMsColor(this)"></div>
            <div class="ms-swatch" style="background:#0a84ff" data-color="#0a84ff" onclick="selectMsColor(this)"></div>
            <div class="ms-swatch" style="background:#32d74b" data-color="#32d74b" onclick="selectMsColor(this)"></div>
            <div class="ms-swatch" style="background:#bf5af2" data-color="#bf5af2" onclick="selectMsColor(this)"></div>
            <div class="ms-swatch" style="background:#ffd60a" data-color="#ffd60a" onclick="selectMsColor(this)"></div>
          </div>
        </div>
        <div><label class="ms-lbl">Your name</label><input class="ms-inp" id="ms-author" placeholder="Name" /></div>
        <button class="ms-savebtn" id="ms-savebtn" onclick="submitMilestone()">Add Milestone</button>
        <div class="ms-msg" id="ms-msg"></div>
      </div>
    </div>
  </div>

  <div class="day-popup" id="day-popup">
    <div class="sheet-header" id="day-popup-hdr">
      <div><div class="sheet-title" id="sheet-title">—</div><div class="sheet-subtitle" id="sheet-subtitle"></div></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>

  <script>
    var CAM_START = new Date(2026,4,27), CAM_END = new Date(2026,5,30);

    var PIPELINE_COLORS = {generated:'#FF0000',in_figma:'#FF0000',designer_review:'#FF0000',approved:'#FF0000',scheduled:'#FF0000',published:'#FF0000',reported:'#FF0000'};
    var STATUS_DOT_COLOR = {generated:'#aaa',in_figma:'#1a56b0',designer_review:'#b45309',approved:'#16a34a',scheduled:'#0a84ff',published:'#16a34a',reported:'#7c3aed'};
    var STATUS_LABEL = {generated:'Generated',in_figma:'In Figma',designer_review:'Designer Review',approved:'Approved',scheduled:'Scheduled',published:'Published',reported:'Reported'};

    var FILTER_DEFS = {platform:[],status:[],emotion:[],funnel:[],week:[]};

    function toLabel(type,v){
      if(type==='status')return STATUS_LABEL[v]||v;
      if(type==='week')return 'Week '+v;
      if(type==='seq')return (v||'').replace(/^SEQ-?/i,'Seq ');
      if((v||'').length<=3)return (v||'').toUpperCase();
      return (v||'').replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
    }
    function _rebuildSeqDefs(){
      if(!calData||!calData.days) return;
      var seen={};
      Object.keys(calData.days).forEach(function(dk){
        (calData.days[dk].posts||[]).forEach(function(p){
          if((p.platform||'').toLowerCase()!=='email') return;
          var sc=p.sequence_code||'';
          if(!sc){var m=(p.asset_id||'').match(/[_-]s(\d+)[_-]/i);if(m)sc='SEQ-'+m[1];}
          if(sc) seen[sc]=true;
        });
      });
      var seqs=Object.keys(seen).sort();
      if(seqs.length) SEQ_DEFS=seqs.map(function(v){return{v:v,l:toLabel('seq',v)};});
      if(!SEQ_DEFS.some(function(d){return d.v==='Onboarding';})) SEQ_DEFS.push({v:'Onboarding',l:'Onboarding'});
      renderSeqPills();
    }
    function loadFilterDefs(){
      google.script.run
        .withSuccessHandler(function(r){
          if(!r||!r.ok)return;
          ['platform','status','emotion','funnel','week'].forEach(function(k){
            FILTER_DEFS[k]=(r[k]||[]).map(function(v){return{v:v,l:toLabel(k,v)};});
          });
          SEQ_DEFS=(r.seq||[]).map(function(v){return{v:v,l:toLabel('seq',v)};});
          if(!SEQ_DEFS.some(function(d){return d.v==='Onboarding';})) SEQ_DEFS.push({v:'Onboarding',l:'Onboarding'});
          if(!SEQ_DEFS.length) _rebuildSeqDefs(); else renderSeqPills();
          renderSidebar();
        })
        .withFailureHandler(function(){})
        .getCockpitFilterDefs();
    }

    var DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];
    var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var _activeCampaign = 'all';
    function switchCampaign(id) {
      _activeCampaign = id;
      dashData = null; calData = null;
      clearFilters();
      load();
    }
    function _populateCampaignSelect(campaignIds) {
      var sel = document.getElementById('campaign-select');
      if (!sel) return;
      var cur = sel.value;
      sel.innerHTML = '<option value="all">All Campaigns</option>';
      (campaignIds || []).forEach(function(cid) {
        var opt = document.createElement('option');
        opt.value = cid; opt.textContent = cid;
        sel.appendChild(opt);
      });
      sel.value = cur || _activeCampaign;
    }

    var dashData=null, calData=null, activeTab='dash';
    var FILTERS={platform:{},status:{},emotion:{},funnel:{},week:{}};
    var ACTIVE_SEQ=null, SEQ_DEFS=[], _lastCalSrc=null;
    var POST_REGISTRY={};  // keyed by asset_id for fast modal lookup
    var SHEET_ID='', SHEET_GID='', DRIVE_FOLDER_URL='';

    // ── Filter helpers ────────────────────────────────────────────────────────
    function activeCount(){return Object.keys(FILTERS.platform).length+Object.keys(FILTERS.status).length+Object.keys(FILTERS.emotion).length+Object.keys(FILTERS.funnel).length+Object.keys(FILTERS.week).length+(ACTIVE_SEQ?1:0);}
    function hasFilters(){return activeCount()>0;}

    function getAllPosts(){
      if(!calData||!calData.days) return [];
      var posts=[];
      POST_REGISTRY={};
      Object.keys(calData.days).forEach(function(dk){
        var day=calData.days[dk];
        day.posts.forEach(function(p){
          var _sc=(p.sequence_code||'').trim();
          if(!_sc&&(p.platform||'').toLowerCase()==='email'){
            var _sm=(p.asset_id||'').match(/[_-]s(\d+)[_-]/i)||(p.asset_id||'').match(/SEQ-(\d+)/i);
            if(_sm)_sc='SEQ-'+_sm[1];
          }
          var post={asset_id:p.asset_id,calendar_id:p.calendar_id||'',dl_id:p.dl_id||'',platform:p.platform,campaign_id:p.campaign_id||'',status:p.status,creative_status:p.creative_status,approval_status:p.approval_status,emotional_stage:p.emotional_stage,funnel_stage:p.funnel_stage,publish_time:p.publish_time||'',blocked:p.blocked,blocked_reason:p.blocked_reason,figma_url:p.figma_url||'',brief_doc_url:p.brief_doc_url||'',claude_design_url:p.claude_design_url||'',full_email_body:p.full_email_body||'',notes:p.notes||'',date:dk,day:day.day,week:day.week,sheet_row:p.sheet_row||0,sequence_code:_sc};
          posts.push(post);
          POST_REGISTRY[p.asset_id]=post;
        });
      });
      return posts;
    }

    function applyFilters(posts){
      return posts.filter(function(p){
        if(Object.keys(FILTERS.platform).length && !FILTERS.platform[p.platform]) return false;
        if(Object.keys(FILTERS.status).length   && !FILTERS.status[p.status])     return false;
        if(Object.keys(FILTERS.emotion).length  && !FILTERS.emotion[p.emotional_stage]) return false;
        if(Object.keys(FILTERS.funnel).length   && !FILTERS.funnel[p.funnel_stage])  return false;
        if(Object.keys(FILTERS.week).length     && !FILTERS.week[String(p.week)])    return false;
        return true;
      });
    }

    function computeDashFromPosts(posts){
      var pipe={generated:0,in_figma:0,designer_review:0,approved:0,scheduled:0,published:0,reported:0};
      var byP={},byF={},byE={},byW={},br={},bpp={},aq=[],bc=0;
      posts.forEach(function(p){
        var st=p.status||'generated',ap=p.approval_status||'pending',pl=p.platform||'',fn=p.funnel_stage||'',em=p.emotional_stage||'',wk=p.week||0;
        pipe[st]=(pipe[st]||0)+1;
        if(!byP[pl]){byP[pl]={generated:0,in_figma:0,designer_review:0,approved:0,scheduled:0,published:0,reported:0};}
        byP[pl][st]++;
        if(!bpp[pl])bpp[pl]={total:0,blocked:0};
        bpp[pl].total++;
        if(fn) byF[fn]=(byF[fn]||0)+1;
        if(em) byE[em]=(byE[em]||0)+1;
        if(wk){var w='week_'+wk;if(!byW[w])byW[w]={total:0,published:0,approved:0,blocked:0};byW[w].total++;if(st==='published')byW[w].published++;if(ap==='approved')byW[w].approved++;if(p.blocked){byW[w].blocked++;bc++;var rsn=(p.blocked_reason||'Unknown').trim();br[rsn]=(br[rsn]||0)+1;bpp[pl].blocked++;}}else if(p.blocked){bc++;var rsn=(p.blocked_reason||'Unknown').trim();br[rsn]=(br[rsn]||0)+1;bpp[pl].blocked++;}
        if(p.creative_status==='approved'&&ap==='pending')aq.push({asset_id:p.asset_id,platform:pl,publish_date:p.date,day:p.day});
      });
      return {ok:true,total_assets:posts.length,pipeline:pipe,by_platform:byP,by_funnel_stage:byF,by_emotional_stage:byE,by_week:byW,blocked_count:bc,blocked_reasons:br,blocked_by_platform:bpp,approval_queue_count:aq.length,approval_queue:aq,ready_to_schedule_count:0,ready_to_schedule:[],late_count:0,late_assets:[]};
    }

    function makeFilteredCalData(posts){
      var days={};
      posts.forEach(function(p){var dk=p.date;if(!days[dk])days[dk]={date:dk,day:p.day,week:p.week,posts:[],total:0,published:0,approved:0,blocked:0};days[dk].posts.push(p);days[dk].total++;if(p.status==='published')days[dk].published++;if(p.approval_status==='approved')days[dk].approved++;if(p.blocked)days[dk].blocked++;});
      return {ok:true,days:days};
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    function renderSidebar(){
      ['platform','status','emotion','funnel','week'].forEach(function(type){
        var el=document.getElementById('fp-'+type); if(!el) return;
        if(!FILTER_DEFS[type].length){el.innerHTML='<span style="color:#555;font-size:11px">Loading…</span>';return;}
        el.innerHTML=FILTER_DEFS[type].map(function(def){
          var on=FILTERS[type][def.v];
          var cls='fp'+(on?(type==='emotion'?' on-em':' on'):'');
          return '<button class="'+cls+'" onclick="toggleFilter(\''+type+'\',\''+def.v+'\')">'+def.l+'</button>';
        }).join('');
      });
      var cnt=activeCount();
      var ac=document.getElementById('active-count'),cb=document.getElementById('clear-btn');
      if(cnt){ac.textContent=cnt+' filter'+(cnt>1?'s':'')+' active';ac.style.display='';cb.style.display='';}
      else{ac.style.display='none';cb.style.display='none';}

    function _saveFilters(){try{localStorage.setItem('ecp_filters',JSON.stringify({f:FILTERS,seq:ACTIVE_SEQ}));}catch(e){}}
    function _restoreFilters(){try{var raw=localStorage.getItem('ecp_filters');if(!raw)return;var s=JSON.parse(raw);if(s&&s.f)FILTERS=s.f;if(s&&s.seq)ACTIVE_SEQ=s.seq;}catch(e){}}

    function toggleFilter(type,value){
      if(!FILTERS[type]) FILTERS[type]={};
      if(FILTERS[type][value]) delete FILTERS[type][value]; else FILTERS[type][value]=true;
      _saveFilters();
      renderSidebar();
      applyAndRender();
    }

    function clearFilters(){FILTERS={platform:{},status:{},emotion:{},funnel:{},week:{}};ACTIVE_SEQ=null;_saveFilters();renderSidebar();renderSeqPills();applyAndRender();}
    function renderSeqPills(){
      var el=document.getElementById('fp-seq'); if(!el) return;
      if(!SEQ_DEFS.length){el.innerHTML='<span style="color:#555;font-size:11px">Loading…</span>';return;}
      el.innerHTML=SEQ_DEFS.map(function(def){
        var on=ACTIVE_SEQ===def.v;
        return '<button class="fp'+(on?' on':'')+'" onclick="setSeq(\''+def.v+'\')">'+def.l+'</button>';
      }).join('');

    function setSeq(v){ACTIVE_SEQ=(ACTIVE_SEQ===v)?null:v;_saveFilters();renderSeqPills();renderSidebar();applyAndRender();}

    function switchTab(tab){

      document.getElementById('tab-cal').className='tab'+(tab==='cal'?' active':'');
      document.getElementById('panel-dash').style.display=tab==='dash'?'':'none';

    // ── Apply & render ────────────────────────────────────────────────────────
    function applyAndRender(){
      if(!calData) return;
      var all=getAllPosts();
      var filtered=hasFilters()?applyFilters(all):all;
      if(ACTIVE_SEQ) filtered=filtered.filter(function(p){return (p.sequence_code||'').trim()===ACTIVE_SEQ;});
      var hasAny=hasFilters()||!!ACTIVE_SEQ;
      var dashSrc=computeDashFromPosts(filtered);
      _lastCalSrc=hasAny?makeFilteredCalData(filtered):calData;
      renderDash(dashSrc, filtered);
      renderCal(_lastCalSrc);
    }

        postsPanel='<div class="posts-panel">' +

          '<div class="posts-list">'+rows+extra+'</div></div>';
      } else if(hasFilters()&&filteredPosts&&filteredPosts.length===0){
        postsPanel='<div class="posts-panel"><div class="posts-panel-hdr"><span class="posts-panel-title">Matching Posts</span></div><div style="color:#555;font-size:12px;padding:4px 0">No posts match the current filters.</div></div>';

            '<div class="card"><div class="card-title">By Week</div><div class="week-grid">'+weekCells+'</div></div>'+
            '<div class="card"><div class="card-title">Emotional Arc <span style="font-size:9px;color:#555;font-weight:400;text-transform:none;letter-spacing:0">tap to filter</span></div><div class="tag-wrap">'+emotions+'</div></div>'+
            '<div class="card"><div class="card-title">Funnel Stages <span style="font-size:9px;color:#555;font-weight:400;text-transform:none;letter-spacing:0">tap to filter</span></div><div class="tag-wrap">'+funnels+'</div></div>'+
          '</div>'+
          '<div class="dash-col">'+
            '<div class="card"><div class="card-title">By Platform</div><div class="plat-grid">'+platCells+'</div></div>'+
            '<div class="card"><div class="card-title yellow">Approval Queue</div>'+aqItems+'</div>'+
            '<div class="card"><div class="card-title red" style="display:flex;align-items:center;justify-content:space-between">Blocked ('+blocked+')'+(blocked>0?'<button id="repair-btn" onclick="repairBlocked()" style="font-size:10px;padding:3px 10px;background:rgba(255,69,58,0.12);border:1px solid #ff453a;color:#ff453a;border-radius:6px;cursor:pointer;font-family:inherit">↻ Fix</button>':'')+'</div>'+blItems+'</div>'+
            lateCard+
          '</div>'+
        '</div>'+
        postsPanel+
        '<div class="card" style="margin-top:10px"><div class="card-title" style="display:flex;align-items:center;justify-content:space-between">Campaign Funnel Map <button class="btn" style="font-size:10px;padding:3px 10px" onclick="loadFunnelMap()">Load Funnel</button></div><div id="funnel-map-body" style="color:#444;font-size:11px;padding:4px 0">Click Load Funnel to see the complete deep link flow.</div></div>'+
        '<button class="btn" onclick="load()">&#8635; Refresh</button>'+
        '<button id="pop-brief-btn" class="btn" onclick="populateBriefUrls(false)" style="margin-left:8px">&#128196; Populate Brief URLs</button>';
    }

    // ── Funnel Map ────────────────────────────────────────────────────────────
    var _funnelLoaded = false;
    function loadFunnelMap() {
      document.getElementById('funnel-map-body').innerHTML = '<span style="color:#555">Loading funnel…</span>';
      google.script.run
        .withSuccessHandler(function(r) {
          if (!r || !r.ok) {
            document.getElementById('funnel-map-body').innerHTML = '<span style="color:#ff453a">Error loading funnel.</span>';
            return;
          }
          var f = r;
          var html = '';

          // Step rows
          var stepIcons = ['📡','🚪','🎯','📧','✅'];
          (f.funnel_flow || []).forEach(function(step, i) {
            html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1e">';
            html += '<div style="font-size:18px;line-height:1;flex-shrink:0">' + (stepIcons[i] || '→') + '</div>';
            html += '<div style="flex:1;min-width:0">';
            html += '<div style="font-size:12px;font-weight:700;color:#e8e8e0;margin-bottom:2px">Step ' + step.step + ' — ' + step.label + '</div>';
            html += '<div style="font-size:11px;color:#777;margin-bottom:4px">' + (step.description || '') + '</div>';

            // Pages
            if (step.pages && step.pages.length) {
              step.pages.forEach(function(pg) {
                var statusColor = pg.status === 'LIVE' ? '#30d158' : '#ff9f0a';
                html += '<div style="display:flex;align-items:center;gap:6px;margin-top:3px">';
                html += '<span style="width:6px;height:6px;border-radius:50%;background:' + statusColor + ';flex-shrink:0;display:inline-block"></span>';
                html += '<span style="font-size:11px;color:#aaa">' + (pg.url || pg.slug || pg.id || '') + '</span>';
                if (pg.variant) html += '<span style="font-size:9px;background:#1e1e2a;color:#a78bfa;padding:1px 5px;border-radius:3px">Variant ' + pg.variant + '</span>';
                html += '<span style="font-size:9px;color:#555">' + (pg.status || '') + '</span>';
                if (pg.thank_you_url) html += '<span style="font-size:9px;color:#444;margin-left:4px">→ ' + pg.thank_you_url + '</span>';
                html += '</div>';
              });
            }

            // DL IDs snippet
            if (step.deep_links && Object.keys(step.deep_links).length) {
              html += '<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">';
              Object.keys(step.deep_links).forEach(function(ch) {
                html += '<span style="font-size:9px;background:#1a1a1e;color:#666;padding:1px 6px;border-radius:3px">' + ch + ': ' + step.deep_links[ch] + '</span>';
              });
              html += '</div>';
            }

            // Email sequences
            if (step.sequences && step.sequences.length) {
              step.sequences.forEach(function(seq) {
                html += '<div style="font-size:11px;color:#666;margin-top:3px">' + seq.code + ' · ' + seq.email_count + ' emails</div>';
              });
            }

            // Post counts
            if (step.post_counts && Object.keys(step.post_counts).length) {
              html += '<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">';
              Object.keys(step.post_counts).forEach(function(pl) {
                var pc = step.post_counts[pl];
                html += '<span style="font-size:9px;background:#1a1a1e;color:#888;padding:1px 6px;border-radius:3px">' + pl + ': ' + pc.total + ' posts</span>';
              });
              html += '</div>';
            }

            html += '</div></div>';
          });

          // DL summary footer
          if (f.deep_link_summary) {
            html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1a1a1e;display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
            html += '<span style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px">Deep Links</span>';
            html += '<span style="font-size:11px;color:#aaa">Total: <strong style="color:#e8e8e0">' + (f.deep_link_summary.total || 0) + '</strong></span>';
            var byC = f.deep_link_summary.by_channel || {};
            Object.keys(byC).forEach(function(ch) {
              html += '<span style="font-size:9px;background:#1a1a1e;color:#666;padding:1px 6px;border-radius:3px">' + ch + ': ' + byC[ch] + '</span>';
            });
            html += '</div>';
          }

          document.getElementById('funnel-map-body').innerHTML = html || '<span style="color:#555">No funnel data yet — run the seed first.</span>';
        })
        .withFailureHandler(function() {
          document.getElementById('funnel-map-body').innerHTML = '<span style="color:#ff453a">Request failed.</span>';
        })
        .getCampaignFunnel(_activeCampaign);
    }

    // ── Calendar 2.0 ──────────────────────────────────────────────────────────
    function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

    var calViewYear=2026, calViewMonth=4; // May 2026 (month is 0-indexed)
    var MILESTONES_BY_DATE={};
    var PILL_BG={
      'Facebook':'rgba(74,158,255,0.22)','Instagram':'rgba(225,48,108,0.22)',
      'Pinterest':'rgba(230,0,35,0.20)','TikTok':'rgba(170,170,170,0.16)',
      'X':'rgba(200,200,200,0.14)','Email':'rgba(255,0,0,0.22)',
      'Nextdoor':'rgba(76,175,80,0.20)','YouTube':'rgba(255,48,64,0.22)'
    };
    var PILL_FG={
      'Facebook':'#4a9eff','Instagram':'#e1306c','Pinterest':'#ff4858',
      'TikTok':'#aaa','X':'#bbb','Email':'var(--accent)',
      'Nextdoor':'#4caf50','YouTube':'#ff3040'
    };
    var PILL_AB={
      'Facebook':'FB','Instagram':'IG','Pinterest':'PIN',
      'TikTok':'TT','X':'X','Email':'EM','Nextdoor':'ND','YouTube':'YT'
    };
    var RED_DATES={'2026-05-27':true,'2026-07-01':true};
    var CAM_START_ISO='2026-05-27', CAM_END_ISO='2026-07-01';
    var CAL_MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

    function prevMonth(){calViewMonth--;if(calViewMonth<0){calViewMonth=11;calViewYear--;}renderCal(_lastCalSrc||calData);}
    function nextMonth(){calViewMonth++;if(calViewMonth>11){calViewMonth=0;calViewYear++;}renderCal(_lastCalSrc||calData);}
    function goToday(){var n=new Date();calViewYear=n.getFullYear();calViewMonth=n.getMonth();renderCal(_lastCalSrc||calData);}

    function renderCal(data){
      var pc=document.getElementById('panel-cal'); if(!pc) return;
      if(!data||!data.days){
        pc.innerHTML='<div class="loading" style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 0">No calendar data.<br><button onclick="syncCalendar()" style="background:rgba(255,0,0,0.12);border:1px solid var(--accent);color:var(--accent);padding:7px 20px;border-radius:7px;font-size:12px;cursor:pointer;margin-top:8px">Sync Posts</button></div>';
        return;
      }
      var days=data.days, allDays=calData?calData.days:{};
      var today=isoDate(new Date()), hasF=hasFilters()||!!ACTIVE_SEQ;

      var nav='<div class="cal-nav">'+
        '<span class="cal-nav-title">May 27 – Jul 1, 2026</span>'+
        '<button class="add-ms-btn" onclick="openMsModal()">+ Milestone</button>'+
      '</div>';

      var _cs=new Date(CAM_START_ISO), _ce=new Date(CAM_END_ISO);
      var CAM_MONTHS=[];
      var _my=_cs.getFullYear(), _mm=_cs.getMonth();
      while(_my<_ce.getFullYear()||(_my===_ce.getFullYear()&&_mm<=_ce.getMonth())){
        CAM_MONTHS.push({y:_my,m:_mm});
        _mm++; if(_mm>11){_mm=0;_my++;}
      }
      var scrollHtml='<div class="cal-scroll">';

      CAM_MONTHS.forEach(function(ym){
        var y=ym.y, mo=ym.m;
        var dim=new Date(y,mo+1,0).getDate();
        var startDow=new Date(y,mo,1).getDay();
        var dowHtml=DOW.map(function(d){return '<div class="cal-dow-cell">'+d+'</div>';}).join('');
        var cells='';
        for(var b=0;b<startDow;b++) cells+='<div class="cal-day outside"><div class="cal-date"><span class="cal-date-num"></span></div></div>';
        for(var d=1;d<=dim;d++){
          var curD=new Date(y,mo,d);
          var dk=isoDate(curD);
          var inC=dk>=CAM_START_ISO&&dk<=CAM_END_ISO;
          var isT=dk===today;
          var isRed=!!RED_DATES[dk];
          var dayObj=days[dk]||null;
          var origDay=allDays[dk]||null;
          var cls='cal-day'+(inC?' in-campaign':'')+(isT?' is-today':'');
          if(dayObj){
            if(dayObj.blocked>0&&dayObj.blocked===dayObj.total) cls+=' has-blocked';
            else if(dayObj.published===dayObj.total&&dayObj.total>0) cls+=' all-published';
          } else if(inC&&origDay&&hasF) cls+=' filtered-empty';
          var msList=MILESTONES_BY_DATE[dk]||[];
          var eventsHtml='';
          msList.forEach(function(ms){
            eventsHtml+='<span class="cal-ms-banner" style="background:'+ms.color+'">'+ms.title+'</span>';
          });
          if(dayObj&&dayObj.posts&&dayObj.posts.length){
            var platMap={};
            dayObj.posts.forEach(function(p){
              var pl=p.platform||'';
              if(!platMap[pl]||p.blocked) platMap[pl]=p;
            });
            Object.keys(platMap).sort().forEach(function(pl){
              var p2=platMap[pl];
              var bg2=PILL_BG[pl]||'rgba(100,100,100,0.18)';
              var fg2=p2.blocked?'#ff453a':(PILL_FG[pl]||'#888');
              var bc2=p2.blocked?'#ff453a':(PILL_FG[pl]||'#555');
              eventsHtml+='<span class="cal-event-bar" style="background:'+bg2+';color:'+fg2+';border-left-color:'+bc2+'">'+pl+'</span>';
            });
          }
          var oc2=(inC&&dayObj)||msList.length?' onclick="openSheet(\''+dk+'\')"':'';

      document.getElementById('sheet-body').innerHTML=posts.map(function(p){
        var dc=p.blocked?'#ff453a':(STATUS_DOT_COLOR[p.status]||'#3a3a3a');

        var bl='';if(p.blocked&&p.blocked_reason){var _pills=p.blocked_reason.split('|').map(function(r){r=r.trim();if(r==='missing dl_id')return '<span class="reason-pill amber">No DL_ID</span>';if(r.toLowerCase().indexOf('figma')>=0)return '<span class="reason-pill gray">Figma pending</span>';return '<span class="reason-pill red">'+r+'</span>';}).join('');bl='<div class="post-blocked">'+_pills+'</div>';}
        var em=p.emotional_stage?'<div class="post-emotion">'+p.emotional_stage+(p.funnel_stage?' · '+p.funnel_stage:'')+'</div>':'';
        var figmaBtn=p.figma_url?'<a class="post-figma-link" href="'+p.figma_url+'" target="_blank" onclick="event.stopPropagation()">↗ Figma</a>':'';
        return '<div class="post-row" onclick="closeSheet();openPostModal(\''+p.asset_id+'\')"><span class="plat-chip '+platformClass(p.platform)+'">'+platformLabel(p.platform)+'</span><div class="post-info"><div class="post-status-line"><span class="status-dot-lg" style="background:'+dc+'"></span>'+st+'</div>'+em+bl+'</div><div class="post-id">'+p.asset_id+'</div>'+figmaBtn+'</div>';
      }).join('')||'<div style="color:#555;padding:12px 0">No posts match current filters.</div>';

      else{_pop.style.left=Math.max(8,(window.innerWidth-500)/2)+'px';_pop.style.top=Math.max(8,(window.innerHeight-400)/3)+'px';}

    function pmLink(label, url, pendingLabel){

      return ready

    function generateDesign(assetId){
      var btn=document.getElementById('pm-gen-btn-'+assetId);
      var msg=document.getElementById('pm-gen-msg-'+assetId);

      if(msg){msg.style.color='#666';msg.textContent='Calling Claude API — usually 15–30 sec…';}
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.ok&&r.url){
            if(POST_REGISTRY[assetId])POST_REGISTRY[assetId].claude_design_url=r.url;
            if(msg){msg.style.color='#32d74b';msg.textContent='✓ Design generated';}
            setTimeout(function(){openPostModal(assetId);},600);
          } else {
            var errMsg=(r&&r.error)||'unknown error';
            if(btn){btn.disabled=false;btn.innerHTML='✦ Generate Design<span class="pm-link-tag">ai</span>';}
            if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+errMsg;}
          }
        })
        .withFailureHandler(function(err){
          if(btn){btn.disabled=false;btn.innerHTML='✦ Generate Design<span class="pm-link-tag">ai</span>';}
          if(msg){msg.style.color='#ff453a';msg.textContent='Connection error: '+(err&&err.message?err.message:String(err));}
        })
        .generateDesignForAsset(assetId);

              });
            } else { _fbCopy(text); if(msg){msg.style.color='#32d74b';msg.textContent='HTML copied';} }

    var FP_IDS  = ['platform','status','emotion','funnel','week','seq'];

    function _fpToast(msg, color) {
      var t = document.getElementById('fp-toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'fp-toast';
        t.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;';

    function _fpShowAll() {
      FP_IDS.forEach(function(id) {
        var el = document.getElementById('fpanel-' + id);
        if (el) el.classList.remove('fp-hidden');
      });
    }
    function _applyPanelPos(posData) {
      var x = 14, y = 58;
      FP_IDS.forEach(function(id) {
        var el = document.getElementById('fpanel-' + id);
        if (!el) return;
        if (posData && posData[id] && typeof posData[id].x === 'number') {
          FP_POS[id] = { x: posData[id].x, y: posData[id].y };
        } else {
          FP_POS[id] = { x: x, y: y };
          y += el.offsetHeight + FP_GAP;
        }
        el.style.left = FP_POS[id].x + 'px';
        el.style.top  = FP_POS[id].y + 'px';
      });
    }
    function initPanels() {
      var _fpDone = false;
      function _fpFinish(posData) {
        if (_fpDone) return;
        _fpDone = true;
        if (!posData || !Object.keys(posData).length) {
          try { var raw = localStorage.getItem('ecp_fp_pos'); if(raw) posData = JSON.parse(raw); } catch(e) {}
        }
        if (posData && Object.keys(posData).length) {
          _applyPanelPos(posData);
        } else {
          _applyPanelPos(null);
        }
        _fpShowAll();
      }
      // Restore from localStorage immediately (no GAS round trip delay)
      var localPos = null;
      try { var _raw = localStorage.getItem('ecp_fp_pos'); if(_raw) localPos = JSON.parse(_raw); } catch(e) {}
      if (localPos && Object.keys(localPos).length) {
        _applyPanelPos(localPos);
        _fpShowAll();
        _fpDone = true;
      }
      // Also load from GAS in background to sync if localStorage was empty
      if (!_fpDone && typeof google !== 'undefined' && google.script) {
        var _fpTimeout = setTimeout(function() { _fpFinish(null); }, 4000);
        google.script.run
          .withSuccessHandler(function(r) {
            clearTimeout(_fpTimeout);
            var sp = null;
            try { if (r && r.positions) sp = JSON.parse(r.positions); } catch(e) {}
            _fpFinish(sp);
          })
          .withFailureHandler(function() {
            clearTimeout(_fpTimeout);
            _fpFinish(null);
          })
          .loadPanelPositions();
      } else if (!_fpDone) {
        _fpFinish(null);
      }
    }

    function _applyFP(id) {
      var el = document.getElementById('fpanel-' + id);
      if (el) { el.style.left = FP_POS[id].x + 'px'; el.style.top = FP_POS[id].y + 'px'; }
    }

    function _snapFP(mid, rx, ry) {
      var mel = document.getElementById('fpanel-' + mid);
      var mw = mel.offsetWidth, mh = mel.offsetHeight;
      var best = null, bestD = FP_SNAP;
      FP_IDS.forEach(function(oid) {
        if (oid === mid) return;
        var oel = document.getElementById('fpanel-' + oid);
        if (!oel || !FP_POS[oid]) return;
        var op = FP_POS[oid], ow = oel.offsetWidth, oh = oel.offsetHeight;
        [
          { x: op.x,               y: op.y + oh + FP_GAP },
          { x: op.x,               y: op.y - mh - FP_GAP },
          { x: op.x + ow + FP_GAP, y: op.y               },
          { x: op.x - mw - FP_GAP, y: op.y               },
        ].forEach(function(c) {
          var d = Math.hypot(rx - c.x, ry - c.y);
          if (d < bestD) { bestD = d; best = c; }
        });
      });
      return best || { x: rx, y: ry };
    }

    function _moveFP(id, rx, ry) {
      var snapped = _snapFP(id, rx, ry);
      var isSnap  = snapped.x !== rx || snapped.y !== ry;
      FP_POS[id]  = snapped;
      _applyFP(id);
      var el = document.getElementById('fpanel-' + id);
      if (el) el.classList.toggle('fp-snapping', isSnap);
    }

    function fpDown(e, id) {
      if (e.button !== 0) return;
      var el = document.getElementById('fpanel-' + id);
      var r  = el.getBoundingClientRect();
      FP_DRAG = { id: id, offX: e.clientX - r.left, offY: e.clientY - r.top };
      el.style.zIndex = 300;
      el.style.transition = 'none';
      e.preventDefault();
    }
    function fpTouch(e, id) {
      var t  = e.touches[0];
      var el = document.getElementById('fpanel-' + id);
      var r  = el.getBoundingClientRect();
      FP_DRAG = { id: id, offX: t.clientX - r.left, offY: t.clientY - r.top };
      el.style.zIndex = 300;
      el.style.transition = 'none';
      e.preventDefault();
    }
    document.addEventListener('mousemove', function(e) {
      if (!FP_DRAG) return;
      _moveFP(FP_DRAG.id, e.clientX - FP_DRAG.offX, e.clientY - FP_DRAG.offY);
    });
    document.addEventListener('touchmove', function(e) {
      if (!FP_DRAG) return;
      var t = e.touches[0];
      _moveFP(FP_DRAG.id, t.clientX - FP_DRAG.offX, t.clientY - FP_DRAG.offY);
      e.preventDefault();
    }, { passive: false });
    function _fpUp() {
      if (!FP_DRAG) return;
      var el = document.getElementById('fpanel-' + FP_DRAG.id);
      if (el) { el.style.zIndex = 150; el.style.transition = ''; el.classList.remove('fp-snapping'); }
      FP_DRAG = null;
      var _posJson = JSON.stringify(FP_POS);
      try { localStorage.setItem('ecp_fp_pos', _posJson); } catch(e) {}
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(r){
            if (r && r.ok) { _fpToast('Layout saved'); }
          })
          .withFailureHandler(function(){})
          .savePanelPositions(_posJson);
      }
    }
    document.addEventListener('mouseup',     _fpUp);
    document.addEventListener('touchend',    _fpUp);
    document.addEventListener('touchcancel', _fpUp);

    // ── Resize engine (shared) ────────────────────────────────────────────────
    var _rsDrag = null;
    function _attachResize(el, posKey) {
      ['n','s','e','w','ne','nw','se','sw'].forEach(function(dir) {
        var h = document.createElement('div');
        h.className = 'rs-handle rs-' + dir;
        h.addEventListener('mousedown', function(e) {
          if (e.button !== 0) return;
          e.preventDefault(); e.stopPropagation();
          var r = el.getBoundingClientRect();
          _rsDrag = { el:el, posKey:posKey, dir:dir,
            sx:e.clientX, sy:e.clientY,
            sw:r.width, sh:r.height, sl:r.left, st:r.top };
        });
        el.appendChild(h);
      });
    }
    document.addEventListener('mousemove', function(e) {
      if (!_rsDrag) return;
      var d=_rsDrag, minW=300, minH=120, dx=e.clientX-d.sx, dy=e.clientY-d.sy;
      var nw=d.sw, nh=d.sh, nl=d.sl, nt=d.st;
      if (d.dir.indexOf('e')>-1) nw=Math.max(minW, d.sw+dx);
      if (d.dir.indexOf('s')>-1) nh=Math.max(minH, d.sh+dy);
      if (d.dir.indexOf('w')>-1) { nw=Math.max(minW,d.sw-dx); nl=d.sl+d.sw-nw; }
      if (d.dir.indexOf('n')>-1) { nh=Math.max(minH,d.sh-dy); nt=d.st+d.sh-nh; }
      d.el.style.width=nw+'px'; d.el.style.left=nl+'px'; d.el.style.top=nt+'px';
      if (d.dir.indexOf('s')>-1||d.dir.indexOf('n')>-1) d.el.style.height=nh+'px';
    });
    document.addEventListener('mouseup', function() {
      if (!_rsDrag) return;
      var d=_rsDrag; _rsDrag=null;
      try {
        var s=JSON.parse(localStorage.getItem(d.posKey)||'{}');
        s.x=parseInt(d.el.style.left); s.y=parseInt(d.el.style.top);
        s.w=d.el.offsetWidth; s.h=d.el.style.height?d.el.offsetHeight:null;
        localStorage.setItem(d.posKey, JSON.stringify(s));
      } catch(e) {}
    });

    // ── Post modal drag ───────────────────────────────────────────────────────
    var _pmDrag = null;
    var _pmHead = document.getElementById('pm-head');
    if (_pmHead) {
      _pmHead.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        var c = document.getElementById('pm-card');
        var r = c.getBoundingClientRect();
        _pmDrag = { offX: e.clientX - r.left, offY: e.clientY - r.top };
        e.preventDefault();
      });
      _pmHead.addEventListener('touchstart', function(e) {
        var t = e.touches[0];
        var c = document.getElementById('pm-card');
        var r = c.getBoundingClientRect();
        _pmDrag = { offX: t.clientX - r.left, offY: t.clientY - r.top };
        e.preventDefault();
      }, { passive: false });
    }
    document.addEventListener('mousemove', function(e) {
      if (!_pmDrag) return;
      var c = document.getElementById('pm-card');
      var x = Math.max(0, Math.min(window.innerWidth  - c.offsetWidth,  e.clientX - _pmDrag.offX));
      var y = Math.max(0, Math.min(window.innerHeight - c.offsetHeight, e.clientY - _pmDrag.offY));
      c.style.left = x + 'px'; c.style.top = y + 'px';
    });
    document.addEventListener('touchmove', function(e) {
      if (!_pmDrag) return;
      var t = e.touches[0];
      var c = document.getElementById('pm-card');
      var x = Math.max(0, Math.min(window.innerWidth  - c.offsetWidth,  t.clientX - _pmDrag.offX));
      var y = Math.max(0, Math.min(window.innerHeight - c.offsetHeight, t.clientY - _pmDrag.offY));
      c.style.left = x + 'px'; c.style.top = y + 'px';
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('mouseup',  function() {
      if (!_pmDrag) return;
      _pmDrag = null;
      var c = document.getElementById('pm-card');
      try { localStorage.setItem('ecp_pm_pos', JSON.stringify({x:parseInt(c.style.left),y:parseInt(c.style.top)})); } catch(e) {}
    });
    document.addEventListener('touchend', function() {
      if (!_pmDrag) return;
      _pmDrag = null;
      var c = document.getElementById('pm-card');
      try { localStorage.setItem('ecp_pm_pos', JSON.stringify({x:parseInt(c.style.left),y:parseInt(c.style.top)})); } catch(e) {}
    });

    // ── Day popup drag ────────────────────────────────────────────────────────
    var _dsPop = null;
    var _dsHdr = document.getElementById('day-popup-hdr');
    if (_dsHdr) {
      _dsHdr.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        var pop = document.getElementById('day-popup');
        var r = pop.getBoundingClientRect();
        _dsPop = { offX: e.clientX - r.left, offY: e.clientY - r.top };
        e.preventDefault();
      });
      _dsHdr.addEventListener('touchstart', function(e) {
        var t = e.touches[0];
        var pop = document.getElementById('day-popup');
        var r = pop.getBoundingClientRect();
        _dsPop = { offX: t.clientX - r.left, offY: t.clientY - r.top };
        e.preventDefault();
      }, { passive: false });
    }
    document.addEventListener('mousemove', function(e) {
      if (!_dsPop) return;
      var pop = document.getElementById('day-popup');
      var x = Math.max(0, Math.min(window.innerWidth  - pop.offsetWidth,  e.clientX - _dsPop.offX));
      var y = Math.max(0, Math.min(window.innerHeight - pop.offsetHeight, e.clientY - _dsPop.offY));
      pop.style.left = x + 'px'; pop.style.top = y + 'px';
    });
    document.addEventListener('touchmove', function(e) {
      if (!_dsPop) return;
      var t = e.touches[0];
      var pop = document.getElementById('day-popup');
      var x = Math.max(0, Math.min(window.innerWidth  - pop.offsetWidth,  t.clientX - _dsPop.offX));
      var y = Math.max(0, Math.min(window.innerHeight - pop.offsetHeight, t.clientY - _dsPop.offY));
      pop.style.left = x + 'px'; pop.style.top = y + 'px';
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('mouseup',  function() {
      if (!_dsPop) return;
      _dsPop = null;
      var pop = document.getElementById('day-popup');
      try { localStorage.setItem('ecp_popup_pos', JSON.stringify({x:parseInt(pop.style.left),y:parseInt(pop.style.top)})); } catch(e) {}
    });
    document.addEventListener('touchend', function() {
      if (!_dsPop) return;
      _dsPop = null;
      var pop = document.getElementById('day-popup');
      try { localStorage.setItem('ecp_popup_pos', JSON.stringify({x:parseInt(pop.style.left),y:parseInt(pop.style.top)})); } catch(e) {}
    });

    _attachResize(document.getElementById('day-popup'), 'ecp_popup_pos');
    _attachResize(document.getElementById('pm-card'),   'ecp_pm_pos');

    _restoreFilters();
    renderSidebar();
    loadFilterDefs();
    load();
    checkFigmaToken();
    setTimeout(initPanels, 0);
    setInterval(load,60000);
  </script>
</body>

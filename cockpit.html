<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Campaign Cockpit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; background: #0c0c0e; color: #f0f0f0; padding: 14px; max-width: 1500px; margin: 0 auto; }

    header { margin-bottom: 12px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .tagline { font-size: 12px; color: #666; }

    /* Layout */
    .cockpit-layout { display: flex; gap: 12px; align-items: flex-start; }

    /* Floating filter panels */
    .filter-panel { position: fixed; background: #161618; border: 1px solid #2a2a2e; border-radius: 10px; padding: 8px 10px 10px; z-index: 150; min-width: 136px; box-shadow: 0 4px 24px rgba(0,0,0,0.45); touch-action: none; transition: box-shadow 0.12s; }
    .filter-panel.fp-snapping { border-color: rgba(10,132,255,0.5); box-shadow: 0 0 0 2px rgba(10,132,255,0.18), 0 4px 24px rgba(0,0,0,0.45); }
    .fp-handle { font-size: 9px; text-transform: uppercase; letter-spacing: 0.9px; color: #555; font-weight: 600; margin-bottom: 6px; cursor: grab; display: flex; align-items: center; gap: 5px; user-select: none; -webkit-user-select: none; }
    .fp-handle:active { cursor: grabbing; }
    .fp-grip { font-size: 14px; color: #333; line-height: 1; }
    .fg-pills { display: flex; flex-direction: column; gap: 3px; }
    .fp { background: transparent; border: 1px solid #222; color: #666; padding: 5px 10px; border-radius: 7px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; text-align: left; transition: all 0.12s; width: 100%; }
    .fp.on { border-color: #0a84ff; color: #0a84ff; background: rgba(10,132,255,0.10); font-weight: 600; }
    .fp.on-em { border-color: #bf5af2; color: #bf5af2; background: rgba(191,90,242,0.10); font-weight: 600; }
    .active-count { font-size: 9px; color: #0a84ff; font-weight: 700; margin-left: auto; display: none; }
    .clear-btn { width: 100%; background: transparent; border: 1px solid #ff453a; color: #ff453a; padding: 6px 10px; border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }

    /* Main */
    .main { flex: 1; min-width: 0; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; background: #161618; border: 1px solid #2a2a2e; border-radius: 12px; padding: 3px; }
    .tab { flex: 1; padding: 8px 0; background: transparent; border: none; color: #666; font-size: 14px; font-weight: 600; border-radius: 9px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .tab.active { background: #2a2a2e; color: #f0f0f0; }

    /* KPIs */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .kpi { background: #161618; border: 1px solid #2a2a2e; border-radius: 12px; padding: 10px 14px; }
    .kpi-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #666; font-weight: 600; }
    .kpi-val { font-size: 26px; font-weight: 700; margin-top: 2px; line-height: 1; }

    /* Two-column */
    .dash-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .dash-col  { display: flex; flex-direction: column; gap: 10px; }

    /* Cards */
    .card { background: #161618; border: 1px solid #2a2a2e; border-radius: 12px; padding: 12px 14px; }
    .card-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #666; margin-bottom: 10px; font-weight: 600; }

    .red    { color: #ff453a; }
    .green  { color: #32d74b; }
    .yellow { color: #ffd60a; }
    .blue   { color: #0a84ff; }

    /* Pipeline — clickable rows */
    .pipeline-row { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; cursor: pointer; border-radius: 6px; padding: 2px 4px; transition: background 0.12s; }
    .pipeline-row:hover { background: #1e1e22; }
    .pipeline-row.on { background: rgba(10,132,255,0.08); }
    .pipeline-label { width: 100px; font-size: 11px; color: #aaa; text-transform: capitalize; flex-shrink: 0; }
    .pipeline-row.on .pipeline-label { color: #0a84ff; font-weight: 600; }
    .bar-wrap { flex: 1; background: #222; border-radius: 4px; height: 13px; overflow: hidden; }
    .bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .pipeline-count { width: 26px; text-align: right; font-size: 11px; color: #888; }

    /* Platform cells — clickable */
    .plat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .plat-cell { background: #1e1e22; border-radius: 8px; padding: 7px 10px; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
    .plat-cell:hover { border-color: #3a3a3e; }
    .plat-cell.on { border-color: #0a84ff; background: rgba(10,132,255,0.08); }
    .plat-name { font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .plat-num  { font-size: 17px; font-weight: 700; }
    .plat-sub  { font-size: 10px; color: #555; margin-top: 1px; }

    /* Week cells — clickable */
    .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .week-cell { background: #1e1e22; border-radius: 7px; padding: 5px 4px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
    .week-cell:hover { border-color: #3a3a3e; }
    .week-cell.on { border-color: #0a84ff; background: rgba(10,132,255,0.08); }
    .week-label { font-size: 9px; color: #666; margin-bottom: 2px; }
    .week-total { font-size: 15px; font-weight: 700; }
    .week-blocked { font-size: 9px; color: #ff453a; margin-top: 1px; }

    /* Emotion tags — clickable */
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .emotion-tag { background: #1e1228; border: 1px solid #3a1a5a; color: #bf5af2; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; transition: all 0.12s; user-select: none; }
    .emotion-tag:hover { border-color: #bf5af2; }
    .emotion-tag.on { background: rgba(191,90,242,0.20); border-color: #bf5af2; font-weight: 600; }

    /* Funnel tags — clickable */
    .funnel-tag { background: #0e1a2e; border: 1px solid #1a3a5a; color: #0a84ff; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; transition: all 0.12s; user-select: none; }
    .funnel-tag:hover { border-color: #0a84ff; }
    .funnel-tag.on { background: rgba(10,132,255,0.20); border-color: #0a84ff; font-weight: 600; }
    .tag-count { color: #888; font-size: 10px; margin-left: 3px; }

    /* List items */
    .queue-item  { background: #1a1c14; border-left: 3px solid #ffd60a; border-radius: 0 7px 7px 0; padding: 6px 10px; margin-bottom: 5px; }
    .blocked-item{ border-left: 3px solid #ff453a; padding: 6px 10px; margin-bottom: 5px; background: #1a1214; border-radius: 0 7px 7px 0; }
    .late-item   { background: #1a1414; border-left: 3px solid #ff6b35; border-radius: 0 7px 7px 0; padding: 6px 10px; margin-bottom: 5px; }
    .item-id   { font-size: 10px; color: #888; }
    .item-main { font-size: 12px; font-weight: 500; margin-top: 2px; }
    .item-meta { font-size: 10px; color: #555; margin-top: 1px; }

    /* Matching Posts panel */
    .posts-panel { background: #161618; border: 1px solid #2a2a2e; border-radius: 12px; padding: 12px 14px; margin-top: 10px; }
    .posts-panel-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .posts-panel-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #0a84ff; font-weight: 600; }
    .posts-panel-count { font-size: 11px; color: #555; }
    .posts-list { max-height: 220px; overflow-y: auto; }
    .post-row-sm { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1e1e22; }
    .post-row-sm:last-child { border-bottom: none; }
    .post-sm-id { font-size: 11px; color: #aaa; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-sm-em  { font-size: 10px; color: #bf5af2; white-space: nowrap; }
    .post-sm-fn  { font-size: 10px; color: #0a84ff; white-space: nowrap; }
    .post-sm-dt  { font-size: 10px; color: #555; white-space: nowrap; }

    /* Refresh */
    .btn { background: #1e1e22; border: 1px solid #2a2a2e; color: #888; padding: 9px; border-radius: 10px; font-size: 13px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer; font-family: inherit; }
    .btn:active { background: #2a2a2e; }

    /* Loading */
    .loading { text-align: center; padding: 60px 0; color: #555; font-size: 14px; }
    .dot-anim::after { content: '.'; animation: dots 1.2s infinite; }
    @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

    /* Calendar */
    .cal-month-label { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
    .cal-dow-cell { text-align: center; font-size: 9px; color: #555; font-weight: 600; padding: 2px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day { background: #0e0e10; border: 1px solid #1a1a1e; border-radius: 7px; padding: 4px; aspect-ratio: 1; cursor: pointer; user-select: none; display: flex; flex-direction: column; }
    .cal-day.in-campaign { background: #161618; border-color: #2a2a2e; }
    .cal-day.is-today { border-color: #0a84ff !important; }
    .cal-day.outside { opacity: 0.2; cursor: default; pointer-events: none; }
    .cal-day.has-blocked.in-campaign { background: #180e0e; }
    .cal-day.all-published.in-campaign { background: #0a180e; }
    .cal-day.filtered-empty { opacity: 0.28; }
    .cal-date { font-size: 10px; font-weight: 600; color: #555; line-height: 1; margin-bottom: 3px; flex-shrink: 0; }
    .cal-day.in-campaign .cal-date { color: #ccc; }
    .cal-day.is-today .cal-date { color: #0a84ff; }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; flex: 1; align-content: flex-start; }
    .cal-dot  { width: 6px; height: 6px; border-radius: 50%; }
    .cal-badge { font-size: 9px; font-weight: 600; color: #888; flex-shrink: 0; }
    .cal-day.has-blocked .cal-badge { color: #ff453a; }
    .cal-day.all-published .cal-badge { color: #32d74b; }

    /* Day sheet */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 20; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }
    .day-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1e; border-radius: 20px 20px 0 0; z-index: 21; max-height: 76vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
    .day-sheet.open { transform: translateY(0); }
    .sheet-handle-wrap { padding: 12px 16px 0; flex-shrink: 0; }
    .sheet-handle { width: 36px; height: 4px; background: #3a3a3e; border-radius: 2px; margin: 0 auto; }
    .sheet-header { padding: 12px 16px 10px; flex-shrink: 0; border-bottom: 1px solid #2a2a2e; display: flex; align-items: baseline; justify-content: space-between; }
    .sheet-title { font-size: 17px; font-weight: 700; }
    .sheet-subtitle { font-size: 11px; color: #666; }
    .sheet-close { background: #2a2a2e; border: none; color: #888; width: 26px; height: 26px; border-radius: 50%; font-size: 13px; cursor: pointer; font-family: inherit; }
    .sheet-body { overflow-y: auto; padding: 10px 16px 28px; flex: 1; }
    .post-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #1e1e22; }
    .post-row:last-child { border-bottom: none; }
    .plat-chip { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; letter-spacing: 0.5px; flex-shrink: 0; min-width: 38px; text-align: center; }
    .post-info { flex: 1; min-width: 0; }
    .post-status-line { font-size: 12px; color: #888; }
    .post-emotion { font-size: 11px; color: #666; margin-top: 1px; }
    .post-id { font-size: 10px; color: #444; white-space: nowrap; }
    .post-figma-link { font-size: 10px; color: #a78bfa; text-decoration: none; white-space: nowrap; padding: 2px 6px; border: 1px solid #3b2f6e; border-radius: 4px; flex-shrink: 0; }
    .post-figma-link:hover { background: #1e1533; color: #c4b5fd; }
    .post-blocked { font-size: 11px; color: #ff453a; margin-top: 2px; }
    .plat-ig  { background: #2a0a18; color: #e1306c; }
    .plat-tt  { background: #1a1a1a; color: #aaa; }
    .plat-pin { background: #2a0005; color: #e60023; }
    .plat-fb  { background: #0a1528; color: #4a9eff; }
    .plat-em  { background: #0a1528; color: #0a84ff; }
    .plat-def { background: #1e1e22; color: #888; }
    .plat-x   { background: #0e0e0e; color: #e0e0e0; }
    .plat-prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .plat-prog-name { font-size: 10px; color: #888; width: 70px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .plat-prog-bar { flex: 1; background: #222; border-radius: 4px; height: 8px; overflow: hidden; }
    .plat-prog-fill { height: 100%; background: #32d74b; border-radius: 4px; transition: width 0.4s ease; }
    .plat-prog-stat { font-size: 10px; color: #555; white-space: nowrap; }
    .blocked-progress-hdr { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #555; font-weight: 600; margin: 10px 0 6px; }
    .status-dot-lg { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; flex-shrink: 0; }

    /* Post detail modal */
    .pm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 40; display: none; align-items: center; justify-content: center; padding: 20px; }
    .pm-overlay.open { display: flex; }
    .pm-card { background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 16px; width: 100%; max-width: 480px; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 24px 64px rgba(0,0,0,0.7); }
    .pm-head { padding: 16px 18px 12px; border-bottom: 1px solid #2a2a2e; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .pm-title { flex: 1; min-width: 0; }
    .pm-asset-id { font-size: 16px; font-weight: 700; color: #f0f0f0; letter-spacing: -0.2px; }
    .pm-asset-sub { font-size: 11px; color: #555; margin-top: 2px; }
    .pm-close { background: #2a2a2e; border: none; color: #888; width: 28px; height: 28px; border-radius: 50%; font-size: 13px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .pm-body { overflow-y: auto; padding: 14px 18px 20px; flex: 1; }
    .pm-section { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #444; font-weight: 600; margin: 14px 0 8px; }
    .pm-section:first-child { margin-top: 0; }
    .pm-row { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-bottom: 1px solid #1e1e22; }
    .pm-row:last-child { border-bottom: none; }
    .pm-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.6px; width: 108px; flex-shrink: 0; }
    .pm-val { font-size: 12px; color: #ccc; flex: 1; min-width: 0; word-break: break-word; }
    .pm-val.hi { color: #f0f0f0; font-weight: 600; }
    .pm-val.red { color: #ff453a; }
    .pm-val.green { color: #32d74b; }
    .pm-val.yellow { color: #ffd60a; }
    .pm-val.blue { color: #0a84ff; }
    .pm-val.purple { color: #bf5af2; }
    .pm-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .pm-link { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 8px; border: 1px solid #2a2a2e; background: #0e0e10; font-size: 11px; font-weight: 600; font-family: inherit; cursor: default; color: #444; text-decoration: none; transition: all 0.12s; }
    .pm-link.ready { border-color: #0a84ff; color: #0a84ff; cursor: pointer; background: rgba(10,132,255,0.08); }
    .pm-link.ready:hover { background: rgba(10,132,255,0.16); }
    .pm-link.generate { border-color: #8b5cf6; color: #8b5cf6; cursor: pointer; background: rgba(139,92,246,0.08); }
    .pm-link.generate:hover { background: rgba(139,92,246,0.16); }
    .pm-design-url { display:flex; gap:8px; margin-top:6px; }
    .pm-design-url input { flex:1; background:#0e0e10; border:1px solid #2a2a2e; border-radius:8px; color:#e0e0e0; font-family:inherit; font-size:11px; padding:6px 10px; height:32px; }
    .pm-design-url input:focus { outline:none; border-color:#8b5cf6; }
    .pm-html-drop { margin-top:6px; }
    .pm-html-toggle { background:none; border:none; color:#555; font-size:10px; font-family:inherit; cursor:pointer; padding:2px 0; letter-spacing:0.4px; }
    .pm-html-toggle:hover { color:#8b5cf6; }
    .pm-html-area { display:none; margin-top:6px; }
    .pm-html-area.open { display:block; }
    .pm-html-area textarea { width:100%; box-sizing:border-box; background:#0e0e10; border:1px solid #2a2a2e; border-radius:8px; color:#e0e0e0; font-family:'DM Mono',monospace; font-size:10px; padding:8px 10px; resize:vertical; min-height:90px; }
    .pm-html-area textarea:focus { outline:none; border-color:#8b5cf6; }
    .pm-link .pm-link-tag { font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 4px; }
    /* Status pickers */
    .pm-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .pm-pick { padding: 5px 12px; border-radius: 7px; border: 1px solid #2a2a2e; background: #0e0e10; font-size: 11px; font-weight: 500; font-family: inherit; cursor: pointer; color: #555; transition: all 0.12s; }
    .pm-pick:hover { border-color: #3a3a3e; color: #aaa; }
    .pm-pick.current { font-weight: 700; cursor: default; }
    .pm-pick.cs-generated  { border-color: #3a3a3a; color: #666; }
    .pm-pick.cs-in_figma   { border-color: #0a4a8a; color: #3a7aff; }
    .pm-pick.cs-designer_review { border-color: #6a5a00; color: #ffd60a; }
    .pm-pick.cs-approved   { border-color: #0a5a1a; color: #32d74b; }
    .pm-pick.as-pending    { border-color: #3a3a3a; color: #666; }
    .pm-pick.as-approved   { border-color: #0a5a1a; color: #32d74b; }
    .pm-pick.as-rejected   { border-color: #5a0a0a; color: #ff453a; }
    .pm-pick.current.cs-generated  { background: rgba(58,58,58,0.3); }
    .pm-pick.current.cs-in_figma   { background: rgba(10,74,138,0.3); }
    .pm-pick.current.cs-designer_review { background: rgba(106,90,0,0.3); }
    .pm-pick.current.cs-approved   { background: rgba(10,90,26,0.3); }
    .pm-pick.current.as-pending    { background: rgba(58,58,58,0.3); }
    .pm-pick.current.as-approved   { background: rgba(10,90,26,0.3); }
    .pm-pick.current.as-rejected   { background: rgba(90,10,10,0.3); }
    .pm-save-msg { font-size: 11px; margin-top: 6px; min-height: 16px; color: #32d74b; }
    /* Notes */
    .pm-notes-feed { max-height: 180px; overflow-y: auto; margin-bottom: 10px; }
    .pm-note-entry { padding: 8px 10px; background: #0e0e10; border-radius: 8px; margin-bottom: 6px; border-left: 2px solid #2a2a2e; }
    .pm-note-meta { font-size: 9px; color: #444; margin-bottom: 4px; letter-spacing: 0.3px; }
    .pm-note-text { font-size: 12px; color: #ccc; white-space: pre-wrap; line-height: 1.5; }
    .pm-note-empty { font-size: 11px; color: #333; font-style: italic; padding: 6px 0; }
    .pm-note-input { width: 100%; background: #0e0e10; border: 1px solid #2a2a2e; border-radius: 8px; color: #ccc; font-family: inherit; font-size: 12px; padding: 9px 11px; resize: none; outline: none; transition: border-color 0.12s; box-sizing: border-box; }
    .pm-note-input:focus { border-color: #0a84ff; }
    .pm-note-row { display: flex; gap: 8px; margin-top: 8px; align-items: flex-end; }
    .pm-note-author { background: #0e0e10; border: 1px solid #2a2a2e; border-radius: 8px; color: #ccc; font-family: inherit; font-size: 11px; padding: 7px 10px; outline: none; width: 110px; flex-shrink: 0; }
    .pm-note-author:focus { border-color: #0a84ff; }
    .pm-note-btn { background: #0a84ff; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
    .pm-note-btn:disabled { background: #1a1a1e; color: #444; cursor: default; }
    .post-row { cursor: pointer; transition: background 0.1s; border-radius: 4px; }
    .post-row:hover { background: #1e1e22; }
    .post-row-sm { cursor: pointer; transition: background 0.1s; border-radius: 4px; padding-left: 4px; padding-right: 4px; }
    .post-row-sm:hover { background: #1e1e22; }

    @media (max-width: 720px) {
      .cockpit-layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
      .fg-pills { flex-direction: row; flex-wrap: wrap; }
      .fp { width: auto; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .dash-cols { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Campaign Cockpit</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <select id="campaign-select" onchange="switchCampaign(this.value)" style="background:#1a1a1e;border:1px solid #333;color:#ccc;padding:5px 10px;border-radius:7px;font-size:11px;font-family:inherit;cursor:pointer">
        <option value="all">All Campaigns</option>
      </select>
      <div class="tagline" id="tagline">Loading<span class="dot-anim"></span></div>
    </div>
  </header>

  <div class="cockpit-layout">

    <!-- Floating filter panels — draggable, magnet-snap -->
    <div class="filter-panel" id="fpanel-platform">
      <div class="fp-handle" onmousedown="fpDown(event,'platform')" ontouchstart="fpTouch(event,'platform')">
        <span class="fp-grip">⠿</span>Platform
        <span class="active-count" id="active-count"></span>
      </div>
      <div class="fg-pills" id="fp-platform"></div>
      <button class="clear-btn" id="clear-btn" onclick="clearFilters()" style="display:none">✕ Clear All</button>
    </div>
    <div class="filter-panel" id="fpanel-status">
      <div class="fp-handle" onmousedown="fpDown(event,'status')" ontouchstart="fpTouch(event,'status')"><span class="fp-grip">⠿</span>Status</div>
      <div class="fg-pills" id="fp-status"></div>
    </div>
    <div class="filter-panel" id="fpanel-emotion">
      <div class="fp-handle" onmousedown="fpDown(event,'emotion')" ontouchstart="fpTouch(event,'emotion')"><span class="fp-grip">⠿</span>Emotion</div>
      <div class="fg-pills" id="fp-emotion"></div>
    </div>
    <div class="filter-panel" id="fpanel-funnel">
      <div class="fp-handle" onmousedown="fpDown(event,'funnel')" ontouchstart="fpTouch(event,'funnel')"><span class="fp-grip">⠿</span>Funnel Stage</div>
      <div class="fg-pills" id="fp-funnel"></div>
    </div>
    <div class="filter-panel" id="fpanel-week">
      <div class="fp-handle" onmousedown="fpDown(event,'week')" ontouchstart="fpTouch(event,'week')"><span class="fp-grip">⠿</span>Week</div>
      <div class="fg-pills" id="fp-week"></div>
    </div>
    <div class="filter-panel" id="fpanel-seq">
      <div class="fp-handle" onmousedown="fpDown(event,'seq')" ontouchstart="fpTouch(event,'seq')"><span class="fp-grip">⠿</span>Sequence</div>
      <div class="fg-pills" id="fp-seq"></div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="tab-bar">
        <button class="tab active" id="tab-dash" onclick="switchTab('dash')">Dashboard</button>
        <button class="tab"        id="tab-cal"  onclick="switchTab('cal')">Calendar</button>
      </div>
      <div id="panel-dash"><div class="loading">Loading<span class="dot-anim"></span></div></div>
      <div id="panel-cal" style="display:none"><div class="loading">Loading calendar<span class="dot-anim"></span></div></div>
    </div>
  </div>

  <!-- Post detail modal -->
  <div class="pm-overlay" id="pm-overlay" onclick="if(event.target===this)closePostModal()">
    <div class="pm-card">
      <div class="pm-head">
        <span id="pm-plat-chip" class="plat-chip plat-def"></span>
        <div class="pm-title">
          <div class="pm-asset-id" id="pm-asset-id">—</div>
          <div class="pm-asset-sub" id="pm-asset-sub"></div>
        </div>
        <button class="pm-close" onclick="closePostModal()">✕</button>
      </div>
      <div class="pm-body" id="pm-body"></div>
    </div>
  </div>

  <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
  <div class="day-sheet" id="day-sheet">
    <div class="sheet-handle-wrap"><div class="sheet-handle"></div></div>
    <div class="sheet-header">
      <div><div class="sheet-title" id="sheet-title">—</div><div class="sheet-subtitle" id="sheet-subtitle"></div></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>

  <script>
    var CAM_START = new Date(2026,4,27), CAM_END = new Date(2026,5,30);

    var PIPELINE_COLORS = {generated:'#3a3a3a',in_figma:'#0a4a8a',designer_review:'#6a5a00',approved:'#0a5a1a',scheduled:'#0a3a6a',published:'#0a6a3a',reported:'#3a3a6a'};
    var STATUS_DOT_COLOR = {generated:'#3a3a3a',in_figma:'#3a7aff',designer_review:'#ffd60a',approved:'#30c05a',scheduled:'#0a84ff',published:'#32d74b',reported:'#bf5af2'};
    var STATUS_LABEL = {generated:'Generated',in_figma:'In Figma',designer_review:'Designer Review',approved:'Approved',scheduled:'Scheduled',published:'Published',reported:'Reported'};

    var FILTER_DEFS = {platform:[],status:[],emotion:[],funnel:[],week:[],seq:[]};

    function toLabel(type,v){
      if(type==='status')return STATUS_LABEL[v]||v;
      if(type==='week')return 'Week '+v;
      if(type==='seq')return 'Seq '+(v||'').replace(/^seq/i,'');
      if((v||'').length<=3)return (v||'').toUpperCase();
      return (v||'').replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
    }
    function loadFilterDefs(){
      google.script.run
        .withSuccessHandler(function(r){
          if(!r||!r.ok)return;
          ['platform','status','emotion','funnel','week','seq'].forEach(function(k){
            FILTER_DEFS[k]=(r[k]||[]).map(function(v){return{v:v,l:toLabel(k,v)};});
          });
          renderSidebar();
        })
        .withFailureHandler(function(){})
        .getCockpitFilterDefs();
    }

    var DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];
    var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var _activeCampaign = 'all';
    function switchCampaign(id) {
      _activeCampaign = id;
      dashData = null; calData = null;
      clearFilters();
      load();
    }
    function _populateCampaignSelect(campaignIds) {
      var sel = document.getElementById('campaign-select');
      if (!sel) return;
      var cur = sel.value;
      sel.innerHTML = '<option value="all">All Campaigns</option>';
      (campaignIds || []).forEach(function(cid) {
        var opt = document.createElement('option');
        opt.value = cid; opt.textContent = cid;
        sel.appendChild(opt);
      });
      sel.value = cur || _activeCampaign;
    }

    var dashData=null, calData=null, activeTab='dash';
    var FILTERS={platform:{},status:{},emotion:{},funnel:{},week:{},seq:{}};
    var POST_REGISTRY={};  // keyed by asset_id for fast modal lookup
    var SHEET_ID='', SHEET_GID='', DRIVE_FOLDER_URL='';

    // ── Filter helpers ────────────────────────────────────────────────────────
    function activeCount(){return Object.keys(FILTERS.platform).length+Object.keys(FILTERS.status).length+Object.keys(FILTERS.emotion).length+Object.keys(FILTERS.funnel).length+Object.keys(FILTERS.week).length+Object.keys(FILTERS.seq).length;}
    function hasFilters(){return activeCount()>0;}

    function getAllPosts(){
      if(!calData||!calData.days) return [];
      var posts=[];
      POST_REGISTRY={};
      Object.keys(calData.days).forEach(function(dk){
        var day=calData.days[dk];
        day.posts.forEach(function(p){
          var post={asset_id:p.asset_id,calendar_id:p.calendar_id||'',dl_id:p.dl_id||'',platform:p.platform,campaign_id:p.campaign_id||'',status:p.status,creative_status:p.creative_status,approval_status:p.approval_status,emotional_stage:p.emotional_stage,funnel_stage:p.funnel_stage,publish_time:p.publish_time||'',blocked:p.blocked,blocked_reason:p.blocked_reason,figma_url:p.figma_url||'',brief_doc_url:p.brief_doc_url||'',claude_design_url:p.claude_design_url||'',notes:p.notes||'',date:dk,day:day.day,week:day.week,sheet_row:p.sheet_row||0};
          posts.push(post);
          POST_REGISTRY[p.asset_id]=post;
        });
      });
      return posts;
    }

    function applyFilters(posts){
      return posts.filter(function(p){
        if(Object.keys(FILTERS.platform).length && !FILTERS.platform[p.platform]) return false;
        if(Object.keys(FILTERS.status).length   && !FILTERS.status[p.status])     return false;
        if(Object.keys(FILTERS.emotion).length  && !FILTERS.emotion[p.emotional_stage]) return false;
        if(Object.keys(FILTERS.funnel).length   && !FILTERS.funnel[p.funnel_stage])  return false;
        if(Object.keys(FILTERS.week).length     && !FILTERS.week[String(p.week)])    return false;
        if(Object.keys(FILTERS.seq).length      && !FILTERS.seq[p.sequence_code])    return false;
        return true;
      });
    }

    function computeDashFromPosts(posts){
      var pipe={generated:0,in_figma:0,designer_review:0,approved:0,scheduled:0,published:0,reported:0};
      var byP={},byF={},byE={},byW={},br={},bpp={},aq=[],bc=0;
      posts.forEach(function(p){
        var st=p.status||'generated',ap=p.approval_status||'pending',pl=p.platform||'',fn=p.funnel_stage||'',em=p.emotional_stage||'',wk=p.week||0;
        pipe[st]=(pipe[st]||0)+1;
        if(!byP[pl]){byP[pl]={generated:0,in_figma:0,designer_review:0,approved:0,scheduled:0,published:0,reported:0};}
        byP[pl][st]++;
        if(!bpp[pl])bpp[pl]={total:0,blocked:0};
        bpp[pl].total++;
        if(fn) byF[fn]=(byF[fn]||0)+1;
        if(em) byE[em]=(byE[em]||0)+1;
        if(wk){var w='week_'+wk;if(!byW[w])byW[w]={total:0,published:0,approved:0,blocked:0};byW[w].total++;if(st==='published')byW[w].published++;if(ap==='approved')byW[w].approved++;if(p.blocked){byW[w].blocked++;bc++;var rsn=(p.blocked_reason||'Unknown').trim();br[rsn]=(br[rsn]||0)+1;bpp[pl].blocked++;}}else if(p.blocked){bc++;var rsn=(p.blocked_reason||'Unknown').trim();br[rsn]=(br[rsn]||0)+1;bpp[pl].blocked++;}
        if(p.creative_status==='approved'&&ap==='pending')aq.push({asset_id:p.asset_id,platform:pl,publish_date:p.date,day:p.day});
      });
      return {ok:true,total_assets:posts.length,pipeline:pipe,by_platform:byP,by_funnel_stage:byF,by_emotional_stage:byE,by_week:byW,blocked_count:bc,blocked_reasons:br,blocked_by_platform:bpp,approval_queue_count:aq.length,approval_queue:aq,ready_to_schedule_count:0,ready_to_schedule:[],late_count:0,late_assets:[]};
    }

    function makeFilteredCalData(posts){
      var days={};
      posts.forEach(function(p){var dk=p.date;if(!days[dk])days[dk]={date:dk,day:p.day,week:p.week,posts:[],total:0,published:0,approved:0,blocked:0};days[dk].posts.push(p);days[dk].total++;if(p.status==='published')days[dk].published++;if(p.approval_status==='approved')days[dk].approved++;if(p.blocked)days[dk].blocked++;});
      return {ok:true,days:days};
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    function renderSidebar(){
      ['platform','status','emotion','funnel','week','seq'].forEach(function(type){
        var el=document.getElementById('fp-'+type); if(!el) return;
        if(!FILTER_DEFS[type].length){el.innerHTML='<span style="color:#555;font-size:11px">Loading…</span>';return;}
        el.innerHTML=FILTER_DEFS[type].map(function(def){
          var on=FILTERS[type][def.v];
          var cls='fp'+(on?(type==='emotion'?' on-em':' on'):'');
          return '<button class="'+cls+'" onclick="toggleFilter(\''+type+'\',\''+def.v+'\')">'+def.l+'</button>';
        }).join('');
      });
      var cnt=activeCount();
      var ac=document.getElementById('active-count'),cb=document.getElementById('clear-btn');
      if(cnt){ac.textContent=cnt+' filter'+(cnt>1?'s':'')+' active';ac.style.display='';cb.style.display='';}
      else{ac.style.display='none';cb.style.display='none';}
    }

    function toggleFilter(type,value){
      if(!FILTERS[type]) FILTERS[type]={};
      if(FILTERS[type][value]) delete FILTERS[type][value]; else FILTERS[type][value]=true;
      renderSidebar();
      applyAndRender();
    }

    function clearFilters(){FILTERS={platform:{},status:{},emotion:{},funnel:{},week:{},seq:{}};renderSidebar();applyAndRender();}

    // ── Tabs ──────────────────────────────────────────────────────────────────
    function switchTab(tab){
      activeTab=tab;
      document.getElementById('tab-dash').className='tab'+(tab==='dash'?' active':'');
      document.getElementById('tab-cal').className='tab'+(tab==='cal'?' active':'');
      document.getElementById('panel-dash').style.display=tab==='dash'?'':'none';
      document.getElementById('panel-cal').style.display=tab==='cal'?'':'none';
      if(tab==='cal') applyAndRender();
    }

    // ── Apply & render ────────────────────────────────────────────────────────
    function applyAndRender(){
      if(!calData) return;
      var all=getAllPosts(), filtered=hasFilters()?applyFilters(all):all;
      var dashSrc=computeDashFromPosts(filtered);
      var calSrc=hasFilters()?makeFilteredCalData(filtered):calData;
      renderDash(dashSrc, filtered);
      renderCal(calSrc);
    }

    // ── Dashboard ─────────────────────────────────────────────────────────────
    function fmt(n){return(n||0).toString();}

    function pipelineBar(label,n,total,color,statusKey){
      var pct=total?Math.max(2,Math.round(n/total*100)):0; if(!n)pct=0;
      var on=FILTERS.status&&FILTERS.status[statusKey];
      return '<div class="pipeline-row'+(on?' on':'')+'" onclick="toggleFilter(\'status\',\''+statusKey+'\')">' +
        '<div class="pipeline-label">'+label.replace(/_/g,' ')+'</div>' +
        '<div class="bar-wrap"><div class="bar" style="width:'+pct+'%;background:'+color+'"></div></div>' +
        '<div class="pipeline-count">'+fmt(n)+'</div></div>';
    }

    function platformClass(p){var m={instagram:'plat-ig',tiktok:'plat-tt',pinterest:'plat-pin',facebook:'plat-fb',email:'plat-em',x:'plat-x'};return m[(p||'').toLowerCase()]||'plat-def';}
    function platformLabel(p){var m={instagram:'IG',tiktok:'TT',pinterest:'PIN',facebook:'FB',email:'EMAIL',x:'X'};return m[(p||'').toLowerCase()]||(p||'').toUpperCase().slice(0,5)||'?';}

    function renderDash(d, filteredPosts){
      var total=d.total_assets||0,blocked=d.blocked_count||0,aq=d.approval_queue_count||0,late=d.late_count||0;
      var now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      document.getElementById('tagline').innerHTML=_activeCampaign+' &nbsp;·&nbsp; '+total+' assets'+(hasFilters()?' <span style="color:#0a84ff">(filtered)</span>':'')+' &nbsp;·&nbsp; '+now;

      // KPIs
      var kpis='<div class="kpi"><div class="kpi-label">Total Assets</div><div class="kpi-val">'+total+'</div></div>'+
        '<div class="kpi"><div class="kpi-label">Blocked</div><div class="kpi-val red">'+blocked+'</div></div>'+
        '<div class="kpi"><div class="kpi-label">Approval Queue</div><div class="kpi-val yellow">'+aq+'</div></div>'+
        '<div class="kpi"><div class="kpi-label">Ready to Post</div><div class="kpi-val green">'+(d.ready_to_schedule_count||0)+'</div></div>';

      // Pipeline — each bar is clickable
      var pipe=d.pipeline||{};
      var pipeBars=Object.keys(pipe).map(function(s){return pipelineBar(s,pipe[s],total,PIPELINE_COLORS[s]||'#444',s);}).join('');

      // Week cells — clickable
      var bw=d.by_week||{};
      var weekCells=Object.keys(bw).sort().map(function(w){
        var wk=bw[w],wn=w.replace('week_',''),on=FILTERS.week&&FILTERS.week[wn];
        return '<div class="week-cell'+(on?' on':'')+'" onclick="toggleFilter(\'week\',\''+wn+'\')">' +
          '<div class="week-label">'+w.replace('week_','Wk')+'</div>' +
          '<div class="week-total">'+wk.total+'</div>' +
          '<div class="week-blocked">'+wk.blocked+' blk</div></div>';
      }).join('');

      // Emotion tags — clickable
      var be=d.by_emotional_stage||{};
      var emotions=Object.keys(be).map(function(e){
        var on=FILTERS.emotion&&FILTERS.emotion[e];
        return '<span class="emotion-tag'+(on?' on':'')+'" onclick="toggleFilter(\'emotion\',\''+e+'\')">' +
          e+'<span class="tag-count"> '+be[e]+'</span></span>';
      }).join('');

      // Funnel tags — clickable
      var bf=d.by_funnel_stage||{};
      var funnels=Object.keys(bf).map(function(f){
        var on=FILTERS.funnel&&FILTERS.funnel[f];
        return '<span class="funnel-tag'+(on?' on':'')+'" onclick="toggleFilter(\'funnel\',\''+f+'\')">' +
          f+'<span class="tag-count"> '+bf[f]+'</span></span>';
      }).join('');

      // Platform cells — clickable
      var bp=d.by_platform||{};
      var platCells=Object.keys(bp).map(function(p){
        var pl=bp[p],gen=pl.generated||0,pub=pl.published||0,on=FILTERS.platform&&FILTERS.platform[p];
        return '<div class="plat-cell'+(on?' on':'')+'" onclick="toggleFilter(\'platform\',\''+p+'\')">' +
          '<div class="plat-name">'+p+'</div><div class="plat-num">'+gen+'</div><div class="plat-sub">'+pub+' published</div></div>';
      }).join('');

      // Approval queue
      var aqItems=(d.approval_queue||[]).slice(0,8).map(function(item){
        return '<div class="queue-item"><div class="item-id">'+item.asset_id+' · '+item.platform+'</div><div class="item-main yellow">Publish: '+(item.publish_date||'—')+'</div></div>';
      }).join('')||'<div style="color:#555;font-size:12px;padding:4px 0">No items awaiting approval.</div>';

      var blItems;
      if(blocked>0){
        var brKeys=Object.keys(d.blocked_reasons||{}).sort();
        var reasonLines=brKeys.map(function(r){var cnt=(d.blocked_reasons||{})[r];return '<div class="blocked-item"><div class="item-id">'+cnt+' asset'+(cnt!==1?'s':'')+'</div><div class="item-main red">'+r+'</div></div>';}).join('');
        var bppKeys=Object.keys(d.blocked_by_platform||{}).sort();
        var platProgLines=bppKeys.map(function(pl){var pp=(d.blocked_by_platform||{})[pl];var unb=pp.total-pp.blocked;var pct=pp.total?Math.round(unb/pp.total*100):0;return '<div class="plat-prog-row"><span class="plat-prog-name">'+pl+'</span><div class="plat-prog-bar"><div class="plat-prog-fill" style="width:'+pct+'%"></div></div><span class="plat-prog-stat">'+unb+'/'+pp.total+'</span></div>';}).join('');
        blItems=(brKeys.length?reasonLines:'')+(bppKeys.length?'<div class="blocked-progress-hdr">Platform Progress</div>'+platProgLines:'');
      }else{
        blItems='<div style="color:#32d74b;font-size:12px;padding:4px 0">No blocked assets.</div>';
      }

      var lateCard=late>0
        ?'<div class="card"><div class="card-title red">Late ('+late+')</div>'+(d.late_assets||[]).slice(0,3).map(function(a){return '<div class="late-item"><div class="item-id">'+a.asset_id+' · '+a.platform+'</div><div class="item-main red">Due: '+a.publish_date+'</div></div>';}).join('')+'</div>'
        :'';

      // Matching posts panel — appears when filters active
      var postsPanel='';
      if(hasFilters()&&filteredPosts&&filteredPosts.length){
        var rows=filteredPosts.slice(0,100).map(function(p){
          var dotColor=p.blocked?'#ff453a':(STATUS_DOT_COLOR[p.status]||'#3a3a3a');
          return '<div class="post-row-sm" onclick="openPostModal(\''+p.asset_id+'\')">' +
            '<span class="plat-chip '+platformClass(p.platform)+'">'+platformLabel(p.platform)+'</span>' +
            '<span class="status-dot-lg" style="background:'+dotColor+'"></span>' +
            '<span class="post-sm-id">'+p.asset_id+'</span>' +
            (p.emotional_stage?'<span class="post-sm-em">'+p.emotional_stage+'</span>':'')+
            (p.funnel_stage?'<span class="post-sm-fn">'+p.funnel_stage+'</span>':'')+
            '<span class="post-sm-dt">'+(p.date||'')+'</span>' +
            '</div>';
        }).join('');
        var extra=filteredPosts.length>100?'<div style="color:#555;font-size:11px;padding:6px 0">+ '+(filteredPosts.length-100)+' more</div>':'';
        postsPanel='<div class="posts-panel">' +
          '<div class="posts-panel-hdr"><span class="posts-panel-title">Matching Posts</span><span class="posts-panel-count">'+filteredPosts.length+' post'+(filteredPosts.length!==1?'s':'')+' &nbsp;·&nbsp; <button onclick="clearFilters()" style="background:none;border:none;color:#ff453a;font-size:11px;cursor:pointer;font-family:inherit">Clear</button></span></div>'+
          '<div class="posts-list">'+rows+extra+'</div></div>';
      } else if(hasFilters()&&filteredPosts&&filteredPosts.length===0){
        postsPanel='<div class="posts-panel"><div class="posts-panel-hdr"><span class="posts-panel-title">Matching Posts</span></div><div style="color:#555;font-size:12px;padding:4px 0">No posts match the current filters.</div></div>';
      }

      document.getElementById('panel-dash').innerHTML=
        '<div class="kpi-grid">'+kpis+'</div>'+
        '<div class="dash-cols">'+
          '<div class="dash-col">'+
            '<div class="card"><div class="card-title">Pipeline Status</div>'+pipeBars+'</div>'+
            '<div class="card"><div class="card-title">By Week</div><div class="week-grid">'+weekCells+'</div></div>'+
            '<div class="card"><div class="card-title">Emotional Arc <span style="font-size:9px;color:#555;font-weight:400;text-transform:none;letter-spacing:0">tap to filter</span></div><div class="tag-wrap">'+emotions+'</div></div>'+
            '<div class="card"><div class="card-title">Funnel Stages <span style="font-size:9px;color:#555;font-weight:400;text-transform:none;letter-spacing:0">tap to filter</span></div><div class="tag-wrap">'+funnels+'</div></div>'+
          '</div>'+
          '<div class="dash-col">'+
            '<div class="card"><div class="card-title">By Platform</div><div class="plat-grid">'+platCells+'</div></div>'+
            '<div class="card"><div class="card-title yellow">Approval Queue</div>'+aqItems+'</div>'+
            '<div class="card"><div class="card-title red">Blocked ('+blocked+')</div>'+blItems+'</div>'+
            lateCard+
          '</div>'+
        '</div>'+
        postsPanel+
        '<div class="card" style="margin-top:10px"><div class="card-title" style="display:flex;align-items:center;justify-content:space-between">Campaign Funnel Map <button class="btn" style="font-size:10px;padding:3px 10px" onclick="loadFunnelMap()">Load Funnel</button></div><div id="funnel-map-body" style="color:#444;font-size:11px;padding:4px 0">Click Load Funnel to see the complete deep link flow.</div></div>'+
        '<button class="btn" onclick="load()">&#8635; Refresh</button>';
    }

    // ── Funnel Map ────────────────────────────────────────────────────────────
    var _funnelLoaded = false;
    function loadFunnelMap() {
      document.getElementById('funnel-map-body').innerHTML = '<span style="color:#555">Loading funnel…</span>';
      google.script.run
        .withSuccessHandler(function(r) {
          if (!r || !r.ok) {
            document.getElementById('funnel-map-body').innerHTML = '<span style="color:#ff453a">Error loading funnel.</span>';
            return;
          }
          var f = r;
          var html = '';

          // Step rows
          var stepIcons = ['📡','🚪','🎯','📧','✅'];
          (f.funnel_flow || []).forEach(function(step, i) {
            html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1e">';
            html += '<div style="font-size:18px;line-height:1;flex-shrink:0">' + (stepIcons[i] || '→') + '</div>';
            html += '<div style="flex:1;min-width:0">';
            html += '<div style="font-size:12px;font-weight:700;color:#e8e8e0;margin-bottom:2px">Step ' + step.step + ' — ' + step.label + '</div>';
            html += '<div style="font-size:11px;color:#777;margin-bottom:4px">' + (step.description || '') + '</div>';

            // Pages
            if (step.pages && step.pages.length) {
              step.pages.forEach(function(pg) {
                var statusColor = pg.status === 'LIVE' ? '#30d158' : '#ff9f0a';
                html += '<div style="display:flex;align-items:center;gap:6px;margin-top:3px">';
                html += '<span style="width:6px;height:6px;border-radius:50%;background:' + statusColor + ';flex-shrink:0;display:inline-block"></span>';
                html += '<span style="font-size:11px;color:#aaa">' + (pg.url || pg.slug || pg.id || '') + '</span>';
                if (pg.variant) html += '<span style="font-size:9px;background:#1e1e2a;color:#a78bfa;padding:1px 5px;border-radius:3px">Variant ' + pg.variant + '</span>';
                html += '<span style="font-size:9px;color:#555">' + (pg.status || '') + '</span>';
                if (pg.thank_you_url) html += '<span style="font-size:9px;color:#444;margin-left:4px">→ ' + pg.thank_you_url + '</span>';
                html += '</div>';
              });
            }

            // DL IDs snippet
            if (step.deep_links && Object.keys(step.deep_links).length) {
              html += '<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">';
              Object.keys(step.deep_links).forEach(function(ch) {
                html += '<span style="font-size:9px;background:#1a1a1e;color:#666;padding:1px 6px;border-radius:3px">' + ch + ': ' + step.deep_links[ch] + '</span>';
              });
              html += '</div>';
            }

            // Email sequences
            if (step.sequences && step.sequences.length) {
              step.sequences.forEach(function(seq) {
                html += '<div style="font-size:11px;color:#666;margin-top:3px">' + seq.code + ' · ' + seq.email_count + ' emails</div>';
              });
            }

            // Post counts
            if (step.post_counts && Object.keys(step.post_counts).length) {
              html += '<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">';
              Object.keys(step.post_counts).forEach(function(pl) {
                var pc = step.post_counts[pl];
                html += '<span style="font-size:9px;background:#1a1a1e;color:#888;padding:1px 6px;border-radius:3px">' + pl + ': ' + pc.total + ' posts</span>';
              });
              html += '</div>';
            }

            html += '</div></div>';
          });

          // DL summary footer
          if (f.deep_link_summary) {
            html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1a1a1e;display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
            html += '<span style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px">Deep Links</span>';
            html += '<span style="font-size:11px;color:#aaa">Total: <strong style="color:#e8e8e0">' + (f.deep_link_summary.total || 0) + '</strong></span>';
            var byC = f.deep_link_summary.by_channel || {};
            Object.keys(byC).forEach(function(ch) {
              html += '<span style="font-size:9px;background:#1a1a1e;color:#666;padding:1px 6px;border-radius:3px">' + ch + ': ' + byC[ch] + '</span>';
            });
            html += '</div>';
          }

          document.getElementById('funnel-map-body').innerHTML = html || '<span style="color:#555">No funnel data yet — run the seed first.</span>';
        })
        .withFailureHandler(function() {
          document.getElementById('funnel-map-body').innerHTML = '<span style="color:#ff453a">Request failed.</span>';
        })
        .getCampaignFunnel(_activeCampaign);
    }

    // ── Calendar ──────────────────────────────────────────────────────────────
    function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

    function renderCal(data){
      if(!data||!data.days){
        var emptyDiv=document.createElement('div');
        emptyDiv.className='loading';
        emptyDiv.style.cssText='display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 0';
        emptyDiv.appendChild(document.createTextNode('No calendar data. Click Sync to pull posts in.'));
        var syncBtn=document.createElement('button');
        syncBtn.textContent='Sync Posts to Calendar';
        syncBtn.style.cssText='background:rgba(10,132,255,0.12);border:1px solid #0a84ff;color:#0a84ff;padding:7px 20px;border-radius:7px;font-size:12px;cursor:pointer';
        syncBtn.onclick=syncCalendar;
        emptyDiv.appendChild(syncBtn);
        var pc=document.getElementById('panel-cal');
        if(pc){pc.innerHTML='';pc.appendChild(emptyDiv);}
        return;
      }
      var days=data.days,today=isoDate(new Date()),allDays=calData?calData.days:{};
      var dowHtml=DOW.map(function(d){return '<div class="cal-dow-cell">'+d+'</div>';}).join('');
      var cells='',cur=new Date(2026,4,24),end=new Date(2026,6,4);
      while(cur<=end){
        var dk=isoDate(cur),dn=cur.getDate(),inC=cur>=CAM_START&&cur<=CAM_END,isT=dk===today;
        var dayObj=days[dk]||null,origDay=allDays[dk]||null;
        var cls='cal-day'+(inC?' in-campaign':' outside')+(isT?' is-today':'');
        if(dayObj){if(dayObj.blocked===dayObj.total&&dayObj.total>0)cls+=' has-blocked';if(dayObj.published===dayObj.total&&dayObj.total>0)cls+=' all-published';}
        else if(inC&&origDay&&hasFilters())cls+=' filtered-empty';
        var dateLbl=dn===1?MONTHS[cur.getMonth()].toUpperCase()+' 1':String(dn);
        var dotsHtml='<div class="cal-dots"></div>',badgeHtml='';
        if(dayObj&&dayObj.total>0){
          var ps={};
          dayObj.posts.forEach(function(p){var c=p.blocked?'#ff453a':(STATUS_DOT_COLOR[p.status]||'#3a3a3a');if(!ps[p.platform]||p.blocked)ps[p.platform]=c;});
          dotsHtml='<div class="cal-dots">'+Object.keys(ps).slice(0,6).map(function(pl){return '<div class="cal-dot" style="background:'+ps[pl]+'"></div>';}).join('')+'</div>';
          badgeHtml='<div class="cal-badge">'+dayObj.total+'</div>';
        }
        var oc=inC&&dayObj?' onclick="openSheet(\''+dk+'\')"':'';
        cells+='<div class="'+cls+'"'+oc+'><div class="cal-date">'+dateLbl+'</div>'+dotsHtml+badgeHtml+'</div>';
        cur.setDate(cur.getDate()+1);
      }
      document.getElementById('panel-cal').innerHTML=
        '<div class="cal-month-label">May 27 – Jun 30, 2026'+(hasFilters()?' <span style="color:#0a84ff;font-size:11px;font-weight:400">(filtered)</span>':'')+'</div>'+
        '<div class="cal-dow">'+dowHtml+'</div>'+
        '<div class="cal-grid">'+cells+'</div>';
    }

    // ── Day sheet ─────────────────────────────────────────────────────────────
    function openSheet(dk){
      var src=calData&&calData.days&&calData.days[dk]?calData.days[dk]:null;if(!src)return;
      var posts=hasFilters()?applyFilters(src.posts.map(function(p){return Object.assign({},p,{date:dk,day:src.day,week:src.week});})):src.posts;
      var parts=dk.split('-'),d=new Date(+parts[0],+parts[1]-1,+parts[2]);
      document.getElementById('sheet-title').textContent=MONTHS[d.getMonth()]+' '+d.getDate()+', 2026';
      document.getElementById('sheet-subtitle').textContent='Day '+src.day+' · Week '+src.week+' · '+posts.length+(posts.length!==src.total?' of '+src.total:'')+' posts';
      document.getElementById('sheet-body').innerHTML=posts.map(function(p){
        var dc=p.blocked?'#ff453a':(STATUS_DOT_COLOR[p.status]||'#3a3a3a');
        var st=(STATUS_LABEL[p.status]||p.status)+(p.approval_status==='approved'?' · Approved':'');
        var bl=p.blocked&&p.blocked_reason?'<div class="post-blocked">⚠ '+p.blocked_reason+'</div>':'';
        var em=p.emotional_stage?'<div class="post-emotion">'+p.emotional_stage+(p.funnel_stage?' · '+p.funnel_stage:'')+'</div>':'';
        var figmaBtn=p.figma_url?'<a class="post-figma-link" href="'+p.figma_url+'" target="_blank" onclick="event.stopPropagation()">↗ Figma</a>':'';
        return '<div class="post-row" onclick="closeSheet();setTimeout(function(){openPostModal(\''+p.asset_id+'\')},220)"><span class="plat-chip '+platformClass(p.platform)+'">'+platformLabel(p.platform)+'</span><div class="post-info"><div class="post-status-line"><span class="status-dot-lg" style="background:'+dc+'"></span>'+st+'</div>'+em+bl+'</div><div class="post-id">'+p.asset_id+'</div>'+figmaBtn+'</div>';
      }).join('')||'<div style="color:#555;padding:12px 0">No posts match current filters.</div>';
      document.getElementById('sheet-overlay').className='sheet-overlay open';
      document.getElementById('day-sheet').className='day-sheet open';
    }
    function closeSheet(){document.getElementById('sheet-overlay').className='sheet-overlay';document.getElementById('day-sheet').className='day-sheet';}

    // ── Post detail modal ─────────────────────────────────────────────────────

        if(p.funnel_stage)    rows+=pmRow('Funnel Stage',    p.funnel_stage,    'blue');

      // Notes

          var lines=entry.split('\n');

          var body=lines.slice(1).join('\n');
          return '<div class="pm-note-entry"><div class="pm-note-meta">'+meta+'</div><div class="pm-note-text">'+body+'</div></div>';

      rows+='<div class="pm-section">Notes</div>';

      rows+='<textarea class="pm-note-input" id="pm-note-input" rows="2" placeholder="Add a note, question, or update…"></textarea>';
      rows+='<div class="pm-note-row">'+
        '<input class="pm-note-author" id="pm-note-author" placeholder="Your name" value="'+(_getAuthor())+'">'+
        '<button class="pm-note-btn" id="pm-note-btn" onclick="submitNote(\''+p.asset_id+'\')">Add Note</button>'+

      rows+='<div class="pm-save-msg" id="pm-note-msg" style="margin-top:6px"></div>';

      var _driveFolderUrl=_folderMap[p.campaign_id]||DRIVE_FOLDER_URL||null;

          ? (p.full_email_body ? _rewriteEmailBtn : _writeEmailBtn)+(p.claude_design_url?_viewDesignLink+_regenBtn+_copyHtmlBtn+_ghBtn:_genBtn)
          : (p.claude_design_url?_viewDesignLink+_regenBtn+_copyHtmlBtn+_ghBtn:_genBtn))+
        pmLink('Figma', p.figma_url||null)+
        pmLink('Google Sheet Row', sheetUrl)+
        pmLink('Drive Folder', _driveFolderUrl)+
      '</div>';
      rows+='<div class="pm-save-msg" id="pm-gen-msg-'+_safeId+'" style="margin-top:4px;font-size:10px"></div>';

    function pmRow(label, value, cls){
      return '<div class="pm-row"><div class="pm-lbl">'+label+'</div><div class="pm-val'+(cls?' '+cls:'')+'">'+value+'</div></div>';
    }
    function pmLink(label, url){
      var ready=!!url;
      var tag='<span class="pm-link-tag">'+(ready?'':'soon')+'</span>';
      return ready
        ? '<a class="pm-link ready" href="'+url+'" target="_blank">↗ '+label+tag+'</a>'

    function generateDesign(assetId){
      var btn=document.getElementById('pm-gen-btn-'+assetId);
      var msg=document.getElementById('pm-gen-msg-'+assetId);
      if(btn){btn.disabled=true;btn.innerHTML='⏳ Generating…<span class="pm-link-tag">ai</span>';}
      if(msg){msg.style.color='#666';msg.textContent='Calling Claude API — usually 15–30 sec…';}
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.ok&&r.url){
            if(POST_REGISTRY[assetId])POST_REGISTRY[assetId].claude_design_url=r.url;
            if(msg){msg.style.color='#32d74b';msg.textContent='✓ Design generated';}
            setTimeout(function(){openPostModal(assetId);},600);
          } else {
            var errMsg=(r&&r.error)||'unknown error';
            if(btn){btn.disabled=false;btn.innerHTML='✦ Generate Design<span class="pm-link-tag">ai</span>';}
            if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+errMsg;}
          }
        })
        .withFailureHandler(function(err){
          if(btn){btn.disabled=false;btn.innerHTML='✦ Generate Design<span class="pm-link-tag">ai</span>';}
          if(msg){msg.style.color='#ff453a';msg.textContent='Connection error: '+(err&&err.message?err.message:String(err));}
        })
        .generateDesignForAsset(assetId);

    function writeEmail(assetId){

        .withSuccessHandler(function(r){
          if(r&&r.ok&&r.full_email_body){

            if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+errMsg;}
          }
        })
        .withFailureHandler(function(err){
          if(btn){btn.disabled=false;btn.innerHTML='✦ Write Email<span class="pm-link-tag">ai</span>';}
          if(msg){msg.style.color='#ff453a';msg.textContent='Connection error: '+(err&&err.message?err.message:String(err));}
        })
        .generateEmailBody(assetId);

    function toggleEmailBody(assetId){
      var area=document.getElementById('pm-eb-area-'+assetId);
      if(area){area.style.display=area.style.display==='none'?'block':'none';}
    }
    function copyEmailBody(assetId){
      var ta=document.getElementById('pm-eb-ta-'+assetId);
      if(!ta)return;
      var text=ta.value;
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          var msg=document.getElementById('pm-gen-msg-'+assetId);
          if(msg){msg.style.color='#32d74b';msg.textContent='✓ Email body copied to clipboard';}
        });
      } else {
        ta.select(); document.execCommand('copy');
        var msg=document.getElementById('pm-gen-msg-'+assetId);
        if(msg){msg.style.color='#32d74b';msg.textContent='✓ Copied';}
      }
    }
    function pushToGithub(assetId){
      var btn=document.getElementById('pm-gh-btn-'+assetId);
      var msg=document.getElementById('pm-gen-msg-'+assetId);
      if(btn){btn.disabled=true;btn.innerHTML='⏳ Pushing…<span class="pm-link-tag">pages</span>';}
      if(msg){msg.style.color='#666';msg.textContent='Pushing to GitHub Pages…';}
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.ok&&r.url){
            if(msg){msg.style.color='#32d74b';msg.textContent='✓ Live at '+r.url;}
            if(btn){btn.disabled=false;btn.innerHTML='✓ On GitHub<span class="pm-link-tag">pages</span>';}
          } else {
            var e=(r&&r.error)||'unknown';
            if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+e;}
            if(btn){btn.disabled=false;btn.innerHTML='↑ GitHub<span class="pm-link-tag">pages</span>';}
          }
        })
        .withFailureHandler(function(err){
          if(btn){btn.disabled=false;btn.innerHTML='↑ GitHub<span class="pm-link-tag">pages</span>';}
          if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+(err&&err.message?err.message:String(err));}
        })
        .saveDesignToGithub(assetId);
    }
    function copyDesignHtml(assetId){
      var btn=document.getElementById('pm-cphtml-btn-'+assetId);
      var msg=document.getElementById('pm-gen-msg-'+assetId);
      if(btn){btn.disabled=true;btn.innerHTML='⏳ Reading…<span class="pm-link-tag">claude</span>';}
      google.script.run
        .withSuccessHandler(function(r){
          if(btn){btn.disabled=false;btn.innerHTML='⎘ Copy HTML<span class="pm-link-tag">claude</span>';}
          if(r&&r.html){
            var text=r.html;
            if(navigator.clipboard&&navigator.clipboard.writeText){
              navigator.clipboard.writeText(text).then(function(){
                if(btn)btn.innerHTML='✓ Copied!<span class="pm-link-tag">claude</span>';
                if(msg){msg.style.color='#32d74b';msg.textContent='HTML copied — paste into Claude.ai to refine';}
                setTimeout(function(){if(btn)btn.innerHTML='⎘ Copy HTML<span class="pm-link-tag">claude</span>';},2500);
              }).catch(function(){
                _fbCopy(text);
                if(msg){msg.style.color='#32d74b';msg.textContent='HTML copied — paste into Claude.ai to refine';}
              });
            } else { _fbCopy(text); if(msg){msg.style.color='#32d74b';msg.textContent='HTML copied';} }
          } else {
            if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+((r&&r.error)||'unknown');}
          }
        })
        .withFailureHandler(function(err){
          if(btn){btn.disabled=false;btn.innerHTML='⎘ Copy HTML<span class="pm-link-tag">claude</span>';}
          if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+(err&&err.message?err.message:String(err));}
        })
        .getDesignHtml(assetId);
    }
    function _fbCopy(text){
      var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta);ta.focus();ta.select();
      try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);
    }
    function togglePasteBack(assetId){
      var el=document.getElementById('pm-pb-area-'+assetId);
      if(!el)return;
      var open=el.classList.toggle('open');
      var btn=el.previousElementSibling;
      if(btn)btn.textContent=(open?'▾':'▸')+' Paste refined HTML back';
    }
    function pasteBackHtml(assetId){
      var ta=document.getElementById('pm-pb-ta-'+assetId);
      var btn=document.getElementById('pm-pb-btn-'+assetId);
      var msg=document.getElementById('pm-pb-msg-'+assetId);
      var html=(ta&&ta.value||'').trim();
      if(!html){if(msg){msg.style.color='#ff453a';msg.textContent='Paste HTML first.';}return;}
      if(btn)btn.disabled=true;
      if(msg){msg.style.color='#666';msg.textContent='Saving…';}
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.ok&&r.url){
            if(POST_REGISTRY[assetId])POST_REGISTRY[assetId].claude_design_url=r.url;
            if(msg){msg.style.color='#32d74b';msg.textContent='✓ Saved';}
            if(btn)btn.disabled=false;
            setTimeout(function(){openPostModal(assetId);},600);
          } else {
            if(msg){msg.style.color='#ff453a';msg.textContent='Error: '+((r&&r.error)||'unknown');}
            if(btn)btn.disabled=false;
          }
        })
        .withFailureHandler(function(){if(btn)btn.disabled=false;if(msg){msg.style.color='#ff453a';msg.textContent='Connection error';}})
        .saveDesignToDrive(assetId, html);
    }
    function _fmtPlatform(p){var m={instagram:'Instagram',tiktok:'TikTok',pinterest:'Pinterest',facebook:'Facebook',email:'Email'};return m[(p||'').toLowerCase()]||p||'—';}
    function _fmtDate(dk,time){if(!dk)return '—';var parts=dk.split('-'),d=new Date(+parts[0],+parts[1]-1,+parts[2]);var ds=MONTHS[d.getMonth()]+' '+d.getDate()+', 2026';return time?ds+' · '+time:ds;}

    function closePostModal(){document.getElementById('pm-overlay').className='pm-overlay';}

    // ── Notes ─────────────────────────────────────────────────────────────────
    function _getAuthor(){try{return localStorage.getItem('cockpit_author')||'';}catch(e){return '';}}
    function _saveAuthor(n){try{if(n)localStorage.setItem('cockpit_author',n);}catch(e){}}

    function submitNote(assetId){
      var input=document.getElementById('pm-note-input');
      var authorEl=document.getElementById('pm-note-author');
      var msg=document.getElementById('pm-note-msg');
      var btn=document.getElementById('pm-note-btn');
      var text=(input&&input.value||'').trim();
      var author=(authorEl&&authorEl.value||'').trim();
      if(!text){if(msg){msg.style.color='#ff453a';msg.textContent='Please enter a note.';}return;}
      _saveAuthor(author);
      if(btn) btn.disabled=true;
      if(msg){msg.style.color='#666';msg.textContent='Saving…';}
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.ok){
            if(POST_REGISTRY[assetId]) POST_REGISTRY[assetId].notes=r.result.notes;
            openPostModal(assetId);
            var m=document.getElementById('pm-note-msg');
            if(m){m.style.color='#32d74b';m.textContent='✓ Note added';}
            // Fire Klaviyo + Figma in the background — best effort, non-blocking
            var p=POST_REGISTRY[assetId]||{};
            var sheetUrl=SHEET_ID&&SHEET_GID&&p.sheet_row?'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/edit#gid='+SHEET_GID+'&range=A'+p.sheet_row:'';
            google.script.run.klaviyoTrackNote(assetId,p.platform||'',text,author,p.brief_doc_url||'',sheetUrl);
            if(p.figma_url) google.script.run.figmaPostComment(p.figma_url,'['+author+'] '+text);
          } else {
            if(btn) btn.disabled=false;
            var m=document.getElementById('pm-note-msg');
            if(m){m.style.color='#ff453a';m.textContent='Error: '+(r&&r.result&&r.result.error?r.result.error:'unknown');}
          }
        })
        .withFailureHandler(function(){
          if(btn) btn.disabled=false;
          var m=document.getElementById('pm-note-msg');
          if(m){m.style.color='#ff453a';m.textContent='Connection error';}
        })
        .appendContentCalNote(assetId, text, author);
    }

    // ── Status update ─────────────────────────────────────────────────────────
    var CS_OPTS=[{v:'generated',l:'Generated'},{v:'in_figma',l:'In Figma'},{v:'designer_review',l:'Designer Review'},{v:'approved',l:'Approved'}];
    var AS_OPTS=[{v:'pending',l:'Pending'},{v:'approved',l:'Approved'},{v:'rejected',l:'Rejected'}];

    function renderPicker(field, opts, prefix, current, assetId){
      return opts.map(function(o){
        var isCur=o.v===current;
        var cls='pm-pick '+prefix+'-'+o.v+(isCur?' current':'');
        var click=isCur?'':' onclick="updatePostField(\''+assetId+'\',\''+field+'\',\''+o.v+'\')"';
        return '<button class="'+cls+'"'+click+'>'+o.l+'</button>';
      }).join('');
    }

    function updatePostField(assetId, field, value){
      var msg=document.getElementById('pm-save-msg');
      if(msg){msg.style.color='#666';msg.textContent='Saving…';}
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.ok){
            if(POST_REGISTRY[assetId]) POST_REGISTRY[assetId][field]=value;
            openPostModal(assetId);
            var m=document.getElementById('pm-save-msg');
            if(m){m.style.color='#32d74b';m.textContent='✓ Saved';}
            setTimeout(function(){if(calData)applyAndRender();},600);
            // Fire Klaviyo status event — best effort
            var p=POST_REGISTRY[assetId]||{};
            var sheetUrl=SHEET_ID&&SHEET_GID&&p.sheet_row?'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/edit#gid='+SHEET_GID+'&range=A'+p.sheet_row:'';
            google.script.run.klaviyoTrackStatusUpdate(assetId,p.platform||'',field,value,p.brief_doc_url||'',sheetUrl);
          } else {
            var m=document.getElementById('pm-save-msg');
            if(m){m.style.color='#ff453a';m.textContent='Error: '+(r&&r.error?r.error:'unknown');}
          }
        })
        .withFailureHandler(function(e){
          var m=document.getElementById('pm-save-msg');
          if(m){m.style.color='#ff453a';m.textContent='Connection error';}
        })
        .updateContentCalField(assetId, field, value);
    }

    // ── Load ──────────────────────────────────────────────────────────────────
    function loadDashboard(){
      google.script.run
        .withSuccessHandler(function(r){if(r&&r.ok){dashData=r;if(!hasFilters()){var all=getAllPosts();renderDash(r,all);}}else{document.getElementById('panel-dash').innerHTML='<div class="loading">Error.</div><button class="btn" onclick="load()" style="margin-top:12px">&#8635; Retry</button>';} })
        .withFailureHandler(function(){document.getElementById('panel-dash').innerHTML='<div class="loading">Connection error.</div><button class="btn" onclick="load()" style="margin-top:12px">&#8635; Retry</button>';})
        .getCampaignDashboard(_activeCampaign);
    }
    function loadCalendar(){
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.ok){
            calData=r;
            if(r.sheet_id)SHEET_ID=r.sheet_id;
            if(r.sheet_gid!==undefined)SHEET_GID=String(r.sheet_gid);
            if(r.drive_folder_url)DRIVE_FOLDER_URL=r.drive_folder_url;
            if(r.campaign_ids) _populateCampaignSelect(r.campaign_ids);
            applyAndRender();
          }
        })
        .withFailureHandler(function(){})
        .getCampaignCalendar(_activeCampaign);
    }
    function load(){
      document.getElementById('tagline').innerHTML=_activeCampaign+' &nbsp;·&nbsp; Refreshing<span class="dot-anim"></span>';
      loadDashboard();loadCalendar();
    }

    // ── Sync posts → ContentCalendar ──────────────────────────────────────────
    function syncCalendar(){
      var panel=document.getElementById('panel-cal');
      if(panel) panel.innerHTML='<div class="loading">Syncing posts → calendar<span class="dot-anim"></span></div>';
      var btn=document.getElementById('cal-sync-btn');
      if(btn){btn.disabled=true;btn.textContent='⏳ Syncing…';}
      google.script.run
        .withSuccessHandler(function(r){
          var btn2=document.getElementById('cal-sync-btn');
          if(btn2){btn2.disabled=false;btn2.textContent='↻ Sync';}
          if(r&&r.ok){
            var msg='✓ Seeded '+(r.total_seeded||0)+' posts';
            var flash=document.getElementById('cal-sync-msg');
            if(flash){flash.textContent=msg;flash.style.color='#32d74b';setTimeout(function(){flash.textContent='';},4000);}
            loadCalendar();
          } else {
            var flash2=document.getElementById('cal-sync-msg');
            if(flash2){flash2.textContent='Error: '+((r&&r.error)||'unknown');flash2.style.color='#ff453a';}
            loadCalendar();
          }
        })
        .withFailureHandler(function(e){
          var btn3=document.getElementById('cal-sync-btn');
          if(btn3){btn3.disabled=false;btn3.textContent='↻ Sync';}
          var flash3=document.getElementById('cal-sync-msg');
          if(flash3){flash3.textContent='Connection error';flash3.style.color='#ff453a';}
          loadCalendar();
        })
        .seedAllCampaignsContentCalendar();
    }

    // ── Figma token expiry banner ────────────────────────────────────
    function checkFigmaToken(){
      google.script.run
        .withSuccessHandler(function(r){
          if(!r||!r.set) return;
          var days=r.days_left;
          if(days>14) return;
          var msg = days<=0
            ? 'Figma API token has EXPIRED — Figma comments are offline. Rotate it in Script Properties and run figmaRecordTokenExpiry().'
            : 'Figma API token expires in '+days+' day'+(days!==1?'s':'')+'. Rotate it soon to keep Figma comments working.';
          var bar=document.createElement('div');
          bar.id='figma-token-bar';
          bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:'+(days<=0?'#c0392b':'#e67e22')+';color:#fff;font:600 13px/1 system-ui;padding:9px 48px 9px 16px;text-align:center;';
          bar.textContent=msg;
          var x=document.createElement('span');
          x.textContent='✕';
          x.style.cssText='position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;';
          x.onclick=function(){bar.remove();};
          bar.appendChild(x);
          document.body.prepend(bar);
        })
        .withFailureHandler(function(){})
        .figmaTokenStatus();
    }

    // ── Draggable filter panels ───────────────────────────────────────────────
    var FP_IDS  = ['platform','status','emotion','funnel','week','seq'];
    var FP_POS  = {};   // id → {x,y}
    var FP_DRAG = null; // {id,offX,offY}
    var FP_SNAP = 36;
    var FP_GAP  = 5;

    function initPanels() {
      var x = 14, y = 58;
      FP_IDS.forEach(function(id) {
        var el = document.getElementById('fpanel-' + id);
        if (!el) return;
        FP_POS[id] = { x: x, y: y };
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        y += el.offsetHeight + FP_GAP;
      });
    }

    function _applyFP(id) {
      var el = document.getElementById('fpanel-' + id);
      if (el) { el.style.left = FP_POS[id].x + 'px'; el.style.top = FP_POS[id].y + 'px'; }
    }

    function _snapFP(mid, rx, ry) {
      var mel = document.getElementById('fpanel-' + mid);
      var mw = mel.offsetWidth, mh = mel.offsetHeight;
      var best = null, bestD = FP_SNAP;
      FP_IDS.forEach(function(oid) {
        if (oid === mid) return;
        var oel = document.getElementById('fpanel-' + oid);
        if (!oel || !FP_POS[oid]) return;
        var op = FP_POS[oid], ow = oel.offsetWidth, oh = oel.offsetHeight;
        [
          { x: op.x,               y: op.y + oh + FP_GAP },
          { x: op.x,               y: op.y - mh - FP_GAP },
          { x: op.x + ow + FP_GAP, y: op.y               },
          { x: op.x - mw - FP_GAP, y: op.y               },
        ].forEach(function(c) {
          var d = Math.hypot(rx - c.x, ry - c.y);
          if (d < bestD) { bestD = d; best = c; }
        });
      });
      return best || { x: rx, y: ry };
    }

    function _moveFP(id, rx, ry) {
      var snapped = _snapFP(id, rx, ry);
      var isSnap  = snapped.x !== rx || snapped.y !== ry;
      FP_POS[id]  = snapped;
      _applyFP(id);
      var el = document.getElementById('fpanel-' + id);
      if (el) el.classList.toggle('fp-snapping', isSnap);
    }

    function fpDown(e, id) {
      if (e.button !== 0) return;
      var el = document.getElementById('fpanel-' + id);
      var r  = el.getBoundingClientRect();
      FP_DRAG = { id: id, offX: e.clientX - r.left, offY: e.clientY - r.top };
      el.style.zIndex = 300;
      el.style.transition = 'none';
      e.preventDefault();
    }
    function fpTouch(e, id) {
      var t  = e.touches[0];
      var el = document.getElementById('fpanel-' + id);
      var r  = el.getBoundingClientRect();
      FP_DRAG = { id: id, offX: t.clientX - r.left, offY: t.clientY - r.top };
      el.style.zIndex = 300;
      el.style.transition = 'none';
      e.preventDefault();
    }
    document.addEventListener('mousemove', function(e) {
      if (!FP_DRAG) return;
      _moveFP(FP_DRAG.id, e.clientX - FP_DRAG.offX, e.clientY - FP_DRAG.offY);
    });
    document.addEventListener('touchmove', function(e) {
      if (!FP_DRAG) return;
      var t = e.touches[0];
      _moveFP(FP_DRAG.id, t.clientX - FP_DRAG.offX, t.clientY - FP_DRAG.offY);
      e.preventDefault();
    }, { passive: false });
    function _fpUp() {
      if (!FP_DRAG) return;
      var el = document.getElementById('fpanel-' + FP_DRAG.id);
      if (el) { el.style.zIndex = 150; el.style.transition = ''; el.classList.remove('fp-snapping'); }
      FP_DRAG = null;
    }
    document.addEventListener('mouseup',     _fpUp);
    document.addEventListener('touchend',    _fpUp);
    document.addEventListener('touchcancel', _fpUp);

    renderSidebar();
    loadFilterDefs();
    load();
    checkFigmaToken();
    setTimeout(initPanels, 0);
    setInterval(load,60000);
  </script>

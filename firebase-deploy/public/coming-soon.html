<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #FF0000;
    --beige: #F6EFE8;
    --black: #000000;
    --white: #FFFFFF;
    --border: #E0D8CE;
    --muted: #555;
    --font-head: 'Proza Libre', sans-serif;
    --font-body: 'Inter', sans-serif;
    --radius: 12px;
  }
  body { font-family: var(--font-body); background: var(--beige); color: var(--black); min-height: 100vh; display: flex; flex-direction: column; }

  .nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: center; }
  .nav-logo { height: 36px; width: auto; display: block; }

  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
  .card { max-width: 560px; width: 100%; }

  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); margin-bottom: 28px; text-align: center; }

  .master-story { margin-bottom: 32px; }
  .master-story h1 { font-family: var(--font-head); font-size: 34px; font-weight: 700; line-height: 1.2; color: var(--black); margin-bottom: 10px; }
  .master-story h1 span { color: var(--red); }
  .category-position { font-size: 16px; font-weight: 600; color: var(--black); margin-bottom: 6px; }
  .supporting-truth { font-size: 15px; color: var(--muted); line-height: 1.6; }

  .divider { width: 40px; height: 2px; background: var(--red); margin: 28px 0; }

  .loop { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
  .loop-step { font-size: 12px; font-weight: 600; color: var(--black); letter-spacing: 0.04em; }
  .loop-arrow { font-size: 11px; color: var(--red); }

  .cta-block { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 28px 24px; }
  .cta-date { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .cta-date strong { color: var(--black); }
  .btn { display: block; width: 100%; background: var(--red); color: var(--white); font-family: var(--font-body); font-size: 15px; font-weight: 600; padding: 15px 24px; border-radius: var(--radius); text-decoration: none; text-align: center; }
  .btn:hover { opacity: 0.88; }
  .btn-note { margin-top: 10px; font-size: 12px; color: var(--muted); text-align: center; }

  .footer { text-align: center; padding: 24px; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<nav class="nav">
  <a href="/lp/waitlist-a"><img src="/assets/logo.png" alt="easyChef Pro" class="nav-logo"></a>
</nav>
<main class="main">
  <div class="card">

    <div class="eyebrow">Launching July 1, 2026</div>

    <div class="master-story">
      <h1>The problem was never you.<br><span>The system was disconnected.</span></h1>
    </div>

    <div class="divider"></div>

    <div class="loop">
      <span class="loop-step">TRACK</span>
      <span class="loop-arrow">&#8594;</span>
      <span class="loop-step">PLAN</span>
      <span class="loop-arrow">&#8594;</span>
      <span class="loop-step">OPTIMIZE</span>
      <span class="loop-arrow">&#8594;</span>
      <span class="loop-step">COOK</span>
      <span class="loop-arrow">&#8594;</span>
      <span class="loop-step">SHOP</span>
    </div>

    <div class="cta-block">
      <p class="cta-date">Early access opens <strong>July 1, 2026</strong>. Founding price locks in forever.</p>
      <div id="cs-form" style="display:flex;gap:8px;max-width:420px;margin:0 auto 12px;">
        <input id="cs-email" type="email" placeholder="Your email address"
          style="flex:1;padding:13px 16px;border:1.5px solid #E0D8CE;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:#000;outline:none;">
        <button onclick="csSubmit()" id="cs-btn"
          style="padding:13px 20px;background:#FF0000;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;">
          Get early access
        </button>
      </div>
      <p id="cs-msg" style="font-size:13px;color:#555;min-height:18px;text-align:center;"></p>
      <p class="btn-note">First 5,000 families only &middot; No credit card required</p>
    </div>

  </div>
</main>
<footer class="footer">&copy; 2026 Digital Galactica Labs &middot; <a href="mailto:hello@easychefpro.com" style="color:inherit;">hello@easychefpro.com</a></footer>
<script>
var CS_GAS_URL = (window.GAS_EXEC_URL || 'https://script.google.com/macros/s/AKfycbz1MwFg8ujR1QNMDiggRTGqAKYLfTYW6FvfPiAv7-L8DWQKurHSJ_mYGr9h0eqQ5jRBrg/exec');
function csSubmit() {
  var email = document.getElementById('cs-email').value.trim();
  var msg   = document.getElementById('cs-msg');
  var btn   = document.getElementById('cs-btn');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.style.color = '#FF0000';
    msg.textContent = 'Please enter a valid email address.';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Saving...';
  msg.style.color = '#555';
  msg.textContent = '';
  fetch(CS_GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'submit_waitlist_signup',
      data: { email: email, lp_variant: 'organic', lp_slug: 'coming-soon', campaign_id: 'EC-2026-001' }
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.ok) {
      document.getElementById('cs-form').style.display = 'none';
      msg.style.color = '#228B22';
      msg.textContent = "You're on the early notice list. I'll be in touch.";
    } else {
      btn.disabled = false;
      btn.textContent = 'Get early access';
      msg.style.color = '#FF0000';
      msg.textContent = 'Something went wrong — please try again.';
    }
  })
  .catch(function(){
    btn.disabled = false;
    btn.textContent = 'Get early access';
    msg.style.color = '#FF0000';
    msg.textContent = 'Something went wrong — please try again.';
  });
}
document.getElementById('cs-email').addEventListener('keydown', function(e){
  if (e.key === 'Enter') csSubmit();
});
</script>
</body>
</html>
